# Build & push the browser backend images to GitHub Container Registry (GHCR),
# the same registry the staging cluster already pulls from (pull secret
# ghcr-projectnuggets). Two images tagged with the commit SHA:
#   ghcr.io/projectnuggets/browser-orchestrator:${github.sha}
#   ghcr.io/projectnuggets/browser-worker:${github.sha}
name: browser-images

on:
  push:
    branches: [main]
    paths:
      - "services/browser-orchestrator/**"
      - "deploy/k8s/browser/Dockerfile.worker"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single-arch amd64: the staging node is amd64. (Add linux/arm64 for prod.)
      - name: Build & push orchestrator
        id: orchestrator
        uses: docker/build-push-action@v6
        with:
          context: services/browser-orchestrator
          file: services/browser-orchestrator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/projectnuggets/browser-orchestrator:${{ github.sha }}

      - name: Build & push worker
        id: worker
        uses: docker/build-push-action@v6
        with:
          context: deploy/k8s/browser
          file: deploy/k8s/browser/Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: ghcr.io/projectnuggets/browser-worker:${{ github.sha }}

      - name: Report pushed digests
        run: |
          echo "orchestrator: ghcr.io/projectnuggets/browser-orchestrator:${{ github.sha }}@${{ steps.orchestrator.outputs.digest }}"
          echo "worker:       ghcr.io/projectnuggets/browser-worker:${{ github.sha }}@${{ steps.worker.outputs.digest }}"
