name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          # Pinned to macos-14: the current macos-latest (15.x) image's
          # SDK/CLT combination fails to link libSystem with zig 0.15.2
          # (undefined _abort/_malloc/__availability_version_check at link)
          # — reproduced on fresh cache, so it's the image toolchain, not
          # cache poisoning. Re-test macos-latest on the next zig bump.
          - os: macos-14
            target: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned via .zigversion)
        uses: mlugg/setup-zig@v2
        with:
          version-file: .zigversion

      - name: Cache .zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          # Keyed on runner IMAGE + zig version: a stale .zig-cache compiled
          # against an older macOS SDK survives image rolls under a
          # source-only key and produces undefined-libc-symbol link failures
          # (the chronic macos-latest red). ImageOS/ImageVersion are set on
          # all GitHub-hosted runners; v2 epoch busts the currently-poisoned
          # entries.
          key: zig-v2-${{ matrix.target }}-${{ env.ImageOS }}${{ env.ImageVersion }}-${{ hashFiles('.zigversion') }}-${{ hashFiles('src/**/*.zig', 'build.zig') }}
          restore-keys: zig-v2-${{ matrix.target }}-${{ env.ImageOS }}${{ env.ImageVersion }}-${{ hashFiles('.zigversion') }}-

      - name: Run tests
        run: zig build test --summary all 2>&1 | tee test-output.txt

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Cross-compile linux-aarch64 (Termux/ARM)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSmall

      - name: Job summary
        if: always()
        run: |
          echo "## nullALIS CI — ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f test-output.txt ]; then
            TESTS=$(grep -o '[0-9]*/[0-9]* tests passed' test-output.txt | head -1 || true)
            RSS=$(grep 'run test' test-output.txt | grep -o 'MaxRSS:[^ ]*' | head -1 | cut -d: -f2 || true)
            echo "| Tests | ${TESTS:-—} |" >> $GITHUB_STEP_SUMMARY
            echo "| Test MaxRSS | ${RSS:-—} |" >> $GITHUB_STEP_SUMMARY
          fi

          BIN="zig-out/bin/nullalis"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="zig-out/bin/nullalis.exe"
          fi
          if [ -f "$BIN" ]; then
            SIZE=$(wc -c < "$BIN" | tr -d ' ')
            SIZE_HR=$(awk "BEGIN {printf \"%.1f MB\", $SIZE / 1048576}")
            echo "| Binary (ReleaseSmall) | ${SIZE_HR} (${SIZE} bytes) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nullalis-${{ matrix.target }}
          path: zig-out/bin/nullalis${{ runner.os == 'Windows' && '.exe' || '' }}

  canonical-production-profile:
    name: Canonical Profile (linux-x86_64, postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    # Finding #1 (coordinator review, 2026-05-21): a live Postgres service so
    # the ~60 postgres-gated integration tests actually RUN in CI. Previously
    # this job compiled the postgres engine but set no NULLALIS_POSTGRES_TEST_URL
    # and provided no database, so every postgres test hit `error.SkipZigTest` —
    # letting postgres-only regressions (FK-violation test bugs, GPA under-free
    # panics, test-runner trips) accumulate undetected. pgvector/pgvector:pg16
    # matches the local dev image and ships both the `vector` and `pgcrypto`
    # extensions the migrations require.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zaki
          POSTGRES_PASSWORD: zaki
          POSTGRES_DB: zaki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zaki -d zaki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned via .zigversion)
        uses: mlugg/setup-zig@v2
        with:
          version-file: .zigversion

      - name: Install Postgres headers/libs
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Run tests (canonical production engines)
        env:
          # Drives the postgres-gated integration tests against the service
          # container above. Without this they SkipZigTest. See Finding #1.
          NULLALIS_POSTGRES_TEST_URL: postgresql://zaki:zaki@localhost:5432/zaki
        run: zig build test --summary all -Dengines=base,sqlite,postgres -Dchannels=cli,telegram

      - name: V1 production verification matrix
        # Sprint S6 — runs the tests/verification/ aggregate against the
        # same pgvector service container as the canonical test step above.
        # The matrix is additive: the previous step still exercises the
        # default suite; this step pins V1 user-facing backend surfaces
        # (health/metrics, approvals, attachments, artifacts, trace shares,
        # extension browser, memory tools incl. memory_purge_pii, GDPR
        # cascade, schema invariants, startup fail-loud, Composio gated lane).
        # The pgvector service container above is a precondition, NOT the
        # subject — a non-PG failure mode (e.g. metric catalog drift) is
        # equally in scope, so the step name stays surface-agnostic.
        env:
          NULLALIS_POSTGRES_TEST_URL: postgresql://zaki:zaki@localhost:5432/zaki
        run: zig build test-postgres --summary all -Dengines=base,sqlite,postgres -Dchannels=cli,telegram

      - name: Build ReleaseSmall (canonical production engines)
        run: zig build -Doptimize=ReleaseSmall -Dengines=base,sqlite,postgres -Dchannels=cli,telegram
