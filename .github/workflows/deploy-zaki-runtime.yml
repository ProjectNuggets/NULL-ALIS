name: Build and Deploy Nullalis for ZAKI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cluster:
        description: "Target DigitalOcean Kubernetes cluster"
        required: false
        default: "zaki-prod"
      namespace:
        description: "Target Kubernetes namespace"
        required: false
        default: "zaki-bot-staging"
      deployment:
        description: "Target Nullalis deployment name"
        required: false
        default: "nullclaw"
      container:
        description: "Target container name"
        required: false
        default: "nullclaw"

env:
  IMAGE_REPO: ghcr.io/projectnuggets/null-alis

concurrency:
  group: deploy-zaki-nullalis
  cancel-in-progress: false

jobs:
  build-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs
        id: image
        run: |
          sha_tag="${IMAGE_REPO}:sha-${GITHUB_SHA}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${sha_tag}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Nullalis image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger zaki-prod runtime deployment
        env:
          DISPATCH_TOKEN: ${{ secrets.ZAKI_PROD_REPO_DISPATCH_TOKEN }}
          CLUSTER: ${{ github.event.inputs.cluster || 'zaki-prod' }}
          NAMESPACE: ${{ github.event.inputs.namespace || 'zaki-bot-staging' }}
          DEPLOYMENT: ${{ github.event.inputs.deployment || 'nullclaw' }}
          CONTAINER: ${{ github.event.inputs.container || 'nullclaw' }}
          IMAGE_REF: ${{ steps.image.outputs.sha_tag }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "ZAKI_PROD_REPO_DISPATCH_TOKEN is not configured."
            exit 1
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/ProjectNuggets/zaki-prod/dispatches \
            -d @- <<EOF
          {
            "event_type": "nullalis_deploy",
            "client_payload": {
              "cluster": "${CLUSTER}",
              "namespace": "${NAMESPACE}",
              "deployment": "${DEPLOYMENT}",
              "container": "${CONTAINER}",
              "image_ref": "${IMAGE_REF}",
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_sha": "${GITHUB_SHA}"
            }
          }
          EOF
