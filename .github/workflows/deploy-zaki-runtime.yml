name: Build and Publish Nullalis Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REPO: ghcr.io/projectnuggets/null-alis

concurrency:
  group: publish-nullalis-image
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs
        id: image
        run: |
          sha_tag="${IMAGE_REPO}:sha-${GITHUB_SHA}"
          raw_tag="${IMAGE_REPO}:${GITHUB_SHA}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "raw_tag=${raw_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${sha_tag}"
            echo "${raw_tag}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Nullalis image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          echo "Published image: ${{ steps.image.outputs.sha_tag }}"
          echo "Immutable alias: ${{ steps.image.outputs.raw_tag }}"
          echo "Production promotion is owned by zaki-infra."
