name: Release

on:
  push:
    tags: ['v*']

jobs:
  canonical-production-profile:
    name: Canonical Profile Gate (linux-x86_64, postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned via .zigversion)
        uses: mlugg/setup-zig@v2
        with:
          version-file: .zigversion

      - name: Install Postgres headers/libs
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build ReleaseSmall (canonical production engines)
        run: zig build -Doptimize=ReleaseSmall -Dengines=base,sqlite,postgres -Dchannels=cli,telegram

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: ""
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-riscv64
            zig_target: riscv64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: ""
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          # Windows builds disabled - not needed for production deployment
          # - os: windows-latest
          #   target: windows-x86_64
          #   zig_target: ""
          #   ext: ".exe"
          # - os: windows-latest
          #   target: windows-aarch64
          #   zig_target: aarch64-windows
          #   ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned via .zigversion)
        uses: mlugg/setup-zig@v2
        with:
          version-file: .zigversion

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nullalis-${{ matrix.target }}
          path: zig-out/bin/nullalis${{ matrix.ext }}

  release:
    needs: [canonical-production-profile, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv nullalis-linux-x86_64/nullalis nullalis-linux-x86_64.bin
          mv nullalis-linux-aarch64/nullalis nullalis-linux-aarch64.bin
          mv nullalis-linux-riscv64/nullalis nullalis-linux-riscv64.bin
          mv nullalis-macos-aarch64/nullalis nullalis-macos-aarch64.bin
          mv nullalis-macos-x86_64/nullalis nullalis-macos-x86_64.bin
          # Windows artifacts disabled
          # mv nullalis-windows-x86_64/nullalis.exe nullalis-windows-x86_64.exe
          # mv nullalis-windows-aarch64/nullalis.exe nullalis-windows-aarch64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nullalis-linux-x86_64.bin
            nullalis-linux-aarch64.bin
            nullalis-linux-riscv64.bin
            nullalis-macos-aarch64.bin
            nullalis-macos-x86_64.bin
            # nullalis-windows-x86_64.exe
            # nullalis-windows-aarch64.exe
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
