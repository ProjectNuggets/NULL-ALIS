apiVersion: v1
kind: ServiceAccount
metadata:
  name: browser-orchestrator
  namespace: browser
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: browser-orchestrator
  namespace: browser
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: browser-orchestrator
  namespace: browser
subjects:
  - kind: ServiceAccount
    name: browser-orchestrator
    namespace: browser
roleRef:
  kind: Role
  name: browser-orchestrator
  apiGroup: rbac.authorization.k8s.io
