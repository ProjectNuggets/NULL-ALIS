# EXAMPLE ONLY — do NOT commit a real key. Create the real Secret out-of-band:
#   kubectl -n browser create secret generic browser-state-master \
#     --from-literal=master-key="$(openssl rand -hex 32)"
# The master key must be >=32 bytes of CSPRNG entropy; rotating it re-keys all
# user vaults (they must be re-established). Keep this Secret tightly RBAC'd.
apiVersion: v1
kind: Secret
metadata:
  name: browser-state-master
  namespace: browser
type: Opaque
stringData:
  master-key: "REPLACE_WITH_openssl_rand_hex_32"
