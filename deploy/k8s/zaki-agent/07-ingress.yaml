apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nullclaw
  namespace: zaki-agent-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-agent
  annotations:
    kubernetes.io/ingress.class: nginx

    # Keep long-running SSE streams stable.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # Route same user to same pod for SQLite single-writer safety.
    # App requests use X-Zaki-User-Id, Telegram uses user_id query arg.
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_x_zaki_user_id$arg_user_id"
spec:
  tls:
    - hosts:
        - agent-staging.zaki.com
      secretName: agent-staging-zaki-com-tls
  rules:
    - host: agent-staging.zaki.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nullclaw
                port:
                  name: http
