apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nullclaw
  namespace: zaki-agent-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nullclaw
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
