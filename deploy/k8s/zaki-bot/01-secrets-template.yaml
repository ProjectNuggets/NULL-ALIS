# LEGACY / REFERENCE ONLY
# Production secret authority lives in zaki-infra. Do not treat this file as the live production source of truth.
apiVersion: v1
kind: Secret
metadata:
  name: nullclaw-runtime-secrets
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-bot
type: Opaque
stringData:
  # Internal API auth used by ZAKI backend and lifecycle hooks.
  INTERNAL_SERVICE_TOKEN: "REPLACE_WITH_STRONG_RANDOM_TOKEN"

  # Primary LLM provider key used by Nullclaw runtime (balanced mode).
  TOGETHER_API_KEY: "REPLACE_WITH_PROVIDER_KEY"

  # Sidecar + STT/TTS provider (Groq free tier — narration, compaction, Whisper).
  GROQ_API_KEY: "REPLACE_WITH_GROQ_API_KEY"

  # Deep mode provider (GLM 5.1 on OpenRouter).
  OPENROUTER_API_KEY: "REPLACE_WITH_OPENROUTER_API_KEY"

  # Canonical state backend for tenant runtime.
  # Example:
  # postgres://user:password@postgres.service.local:5432/nullalis
  POSTGRES_CONNECTION_STRING: "REPLACE_WITH_POSTGRES_CONNECTION_STRING"

  # Optional runtime DSN routed through PgBouncer service.
  # Example:
  # postgres://user:password@nullclaw-pgbouncer.zaki-bot-staging.svc.cluster.local:6432/nullalis
  PGBOUNCER_CONNECTION_STRING: "REPLACE_WITH_PGBOUNCER_CONNECTION_STRING"

  # PgBouncer upstream Postgres target and auth.
  PGBOUNCER_DB_HOST: "REPLACE_WITH_POSTGRES_HOST"
  PGBOUNCER_DB_PORT: "5432"
  PGBOUNCER_DB_NAME: "REPLACE_WITH_POSTGRES_DB"
  PGBOUNCER_DB_USER: "REPLACE_WITH_POSTGRES_USER"
  PGBOUNCER_DB_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"

  # PgBouncer admin/stats users for local operational checks.
  PGBOUNCER_ADMIN_USER: "pgb_admin"
  PGBOUNCER_ADMIN_PASSWORD: "REPLACE_WITH_PGBOUNCER_ADMIN_PASSWORD"
  PGBOUNCER_STATS_USER: "pgb_stats"
  PGBOUNCER_STATS_PASSWORD: "REPLACE_WITH_PGBOUNCER_STATS_PASSWORD"

  # Global Composio platform API key.
  # User scoping is done by per-user entity_id in tenant runtime.
  COMPOSIO_API_KEY: "REPLACE_WITH_COMPOSIO_API_KEY"

  # Shared bot token currently used by runtime channel sender.
  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"

  # Shared webhook secret enforced by gateway for Telegram inbound requests.
  # Keep this in sync with connect requests sent by ZAKI backend.
  TELEGRAM_WEBHOOK_SECRET: "REPLACE_WITH_TELEGRAM_WEBHOOK_SECRET"

  # Optional static S3 credentials for Litestream sidecar.
  # If your cluster uses IAM role/service account integration, remove these keys
  # and rely on workload identity instead.
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY_ID"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_ACCESS_KEY"
