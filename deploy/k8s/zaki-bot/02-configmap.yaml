apiVersion: v1
kind: ConfigMap
metadata:
  name: nullclaw-runtime-config
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-bot
data:
  GATEWAY_HOST: "0.0.0.0"
  GATEWAY_PORT: "3000"
  STATE_BACKEND: "postgres"
  POSTGRES_SCHEMA: "zaki_bot"
  POSTGRES_POOL_MAX: "8"
  POSTGRES_STATEMENT_TIMEOUT_MS: "5000"
  POSTGRES_LOCK_TIMEOUT_MS: "2000"
  POSTGRES_USE_PGBOUNCER: "true"

  PGBOUNCER_PORT: "6432"
  PGBOUNCER_POOL_MODE: "transaction"
  PGBOUNCER_MAX_CLIENT_CONN: "4000"
  PGBOUNCER_DEFAULT_POOL_SIZE: "20"
  PGBOUNCER_RESERVE_POOL_SIZE: "5"
  PGBOUNCER_MIN_POOL_SIZE: "5"
  PGBOUNCER_MAX_DB_CONNECTIONS: "100"
  COMPOSIO_ENABLED: "false"
  COMPOSIO_ENTITY_ID: "default"

  # Tenant user data root on mounted RWX volume.
  TENANT_DATA_ROOT: "/data/users"

  # Dedicated ingress host for agent runtime.
  PUBLIC_BASE_URL: "https://agent-staging.zaki.com"

  # Set to "*" for initial staging. For production, replace with explicit IDs
  # or implement per-user mapping enforcement in Nullclaw before tightening.
  TELEGRAM_ALLOW_FROM: "*"

  # Canonical tenant lane policy: app main lane only, channels use thread lanes.
  SESSION_CROSS_CHANNEL_SHARED_MAIN: "false"

  # Litestream backup target settings.
  LITESTREAM_S3_BUCKET: "REPLACE_WITH_S3_BUCKET"
  LITESTREAM_S3_PREFIX: "nullclaw/users"
  LITESTREAM_SYNC_INTERVAL: "5s"
  AWS_REGION: "us-east-1"
