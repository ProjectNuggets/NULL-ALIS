apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-bot
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nullclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nullclaw
        app.kubernetes.io/part-of: zaki-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nullclaw
      terminationGracePeriodSeconds: 180
      containers:
        - name: nullclaw
          # Replace with your registry/tag.
          image: ghcr.io/nullclaw/nullclaw:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nullclaw-runtime-config
            - secretRef:
                name: nullclaw-runtime-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export HOME=/nullclaw-data
              export NULLALIS_CONFIG_PATH=/nullclaw-data/.nullalis/config.json

              mkdir -p /nullclaw-data/.nullalis
              mkdir -p "${TENANT_DATA_ROOT}"

              POSTGRES_RUNTIME_CONNECTION_STRING="${POSTGRES_CONNECTION_STRING}"
              if [ "${POSTGRES_USE_PGBOUNCER:-false}" = "true" ] && [ -n "${PGBOUNCER_CONNECTION_STRING:-}" ]; then
                POSTGRES_RUNTIME_CONNECTION_STRING="${PGBOUNCER_CONNECTION_STRING}"
              fi
              SESSION_SHARED_MAIN_BOOL=false
              if [ "${SESSION_CROSS_CHANNEL_SHARED_MAIN:-false}" = "true" ]; then
                SESSION_SHARED_MAIN_BOOL=true
              fi
              json_escape() {
                # Escape arbitrary env values so runtime config JSON remains valid.
                printf '%s' "$1" | sed \
                  -e 's/\\/\\\\/g' \
                  -e 's/"/\\"/g' \
                  -e ':a' \
                  -e 'N' \
                  -e '$!ba' \
                  -e 's/\n/\\n/g' \
                  -e 's/\r/\\r/g' \
                  -e 's/\t/\\t/g'
              }
              require_bool() {
                case "$2" in
                  true|false) ;;
                  *)
                    echo "invalid boolean for $1: $2" >&2
                    exit 1
                    ;;
                esac
              }
              require_uint() {
                case "$2" in
                  ''|*[!0-9]*)
                    echo "invalid integer for $1: $2" >&2
                    exit 1
                    ;;
                  *)
                    ;;
                esac
              }
              require_bool COMPOSIO_ENABLED "${COMPOSIO_ENABLED}"
              require_uint GATEWAY_PORT "${GATEWAY_PORT}"
              require_uint POSTGRES_POOL_MAX "${POSTGRES_POOL_MAX}"
              require_uint POSTGRES_STATEMENT_TIMEOUT_MS "${POSTGRES_STATEMENT_TIMEOUT_MS}"
              require_uint POSTGRES_LOCK_TIMEOUT_MS "${POSTGRES_LOCK_TIMEOUT_MS}"
              OPENROUTER_API_KEY_ESC="$(json_escape "${OPENROUTER_API_KEY}")"
              INTERNAL_SERVICE_TOKEN_ESC="$(json_escape "${INTERNAL_SERVICE_TOKEN}")"
              GATEWAY_HOST_ESC="$(json_escape "${GATEWAY_HOST}")"
              TENANT_DATA_ROOT_ESC="$(json_escape "${TENANT_DATA_ROOT}")"
              STATE_BACKEND_ESC="$(json_escape "${STATE_BACKEND}")"
              POSTGRES_RUNTIME_CONNECTION_STRING_ESC="$(json_escape "${POSTGRES_RUNTIME_CONNECTION_STRING}")"
              POSTGRES_SCHEMA_ESC="$(json_escape "${POSTGRES_SCHEMA}")"
              COMPOSIO_API_KEY_ESC="$(json_escape "${COMPOSIO_API_KEY}")"
              COMPOSIO_ENTITY_ID_ESC="$(json_escape "${COMPOSIO_ENTITY_ID}")"
              TELEGRAM_BOT_TOKEN_ESC="$(json_escape "${TELEGRAM_BOT_TOKEN}")"
              TELEGRAM_WEBHOOK_SECRET_ESC="$(json_escape "${TELEGRAM_WEBHOOK_SECRET}")"
              TELEGRAM_ALLOW_FROM_ESC="$(json_escape "${TELEGRAM_ALLOW_FROM}")"

              cat > /nullclaw-data/.nullalis/config.json <<JSON
              {
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "openrouter/moonshotai/kimi-k2.5"
                    }
                  }
                },
                "models": {
                  "providers": {
                    "openrouter": {
                      "api_key": "${OPENROUTER_API_KEY_ESC}",
                      "base_url": "https://openrouter.ai/api/v1"
                    }
                  }
                },
                "gateway": {
                  "port": ${GATEWAY_PORT},
                  "host": "${GATEWAY_HOST_ESC}",
                  "require_pairing": false,
                  "allow_public_bind": true,
                  "max_workers": 16,
                  "max_queued_requests": 2048,
                  "internal_service_tokens": ["${INTERNAL_SERVICE_TOKEN_ESC}"]
                },
                "tenant": {
                  "enabled": true,
                  "data_root": "${TENANT_DATA_ROOT_ESC}",
                  "runtime_cache_max_users": 2048,
                  "runtime_idle_ttl_secs": 1800
                },
                "state": {
                  "backend": "${STATE_BACKEND_ESC}",
                  "postgres": {
                    "connection_string": "${POSTGRES_RUNTIME_CONNECTION_STRING_ESC}",
                    "schema": "${POSTGRES_SCHEMA_ESC}",
                    "pool_max": ${POSTGRES_POOL_MAX},
                    "statement_timeout_ms": ${POSTGRES_STATEMENT_TIMEOUT_MS},
                    "lock_timeout_ms": ${POSTGRES_LOCK_TIMEOUT_MS}
                  }
                },
                "composio": {
                  "enabled": ${COMPOSIO_ENABLED},
                  "api_key": "${COMPOSIO_API_KEY_ESC}",
                  "entity_id": "${COMPOSIO_ENTITY_ID_ESC}"
                },
                "session": {
                  "cross_channel_shared_main": ${SESSION_SHARED_MAIN_BOOL}
                },
                "channels": {
                  "telegram": {
                    "accounts": {
                      "default": {
                        "account_id": "default",
                        "bot_token": "${TELEGRAM_BOT_TOKEN_ESC}",
                        "receive_mode": "webhook",
                        "webhook_secret_token": "${TELEGRAM_WEBHOOK_SECRET_ESC}",
                        "allow_from": ["${TELEGRAM_ALLOW_FROM_ESC}"]
                      }
                    }
                  }
                }
              }
              JSON

              exec nullalis gateway --host "${GATEWAY_HOST}" --port "${GATEWAY_PORT}"
          volumeMounts:
            - name: tenant-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -sS -X POST "http://127.0.0.1:3000/internal/drain" -H "X-Internal-Token: ${INTERNAL_SERVICE_TOKEN}" || true
                    sleep 5
                    curl -sS -X POST "http://127.0.0.1:3000/internal/shutdown" -H "X-Internal-Token: ${INTERNAL_SERVICE_TOKEN}" || true
          resources:
            requests:
              cpu: "750m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
        - name: litestream
          image: litestream/litestream:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nullclaw-runtime-config
            - secretRef:
                name: nullclaw-runtime-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec litestream replicate -config /etc/litestream/litestream.yml
          volumeMounts:
            - name: tenant-data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tenant-data
          persistentVolumeClaim:
            claimName: nullclaw-data-rwx
        - name: litestream-config
          configMap:
            name: nullclaw-litestream-config
