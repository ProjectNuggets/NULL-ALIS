apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nullclaw
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-bot
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nullclaw
  namespaceSelector:
    matchNames:
      - zaki-bot-staging
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
