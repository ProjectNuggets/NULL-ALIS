apiVersion: v1
kind: ServiceAccount
metadata:
  name: nullalis-controller
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullalis-controller
    app.kubernetes.io/part-of: zaki-bot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nullalis-controller
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullalis-controller
    app.kubernetes.io/part-of: zaki-bot
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nullalis-controller
  namespace: zaki-bot-staging
  labels:
    app.kubernetes.io/name: nullalis-controller
    app.kubernetes.io/part-of: zaki-bot
subjects:
  - kind: ServiceAccount
    name: nullalis-controller
    namespace: zaki-bot-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nullalis-controller
