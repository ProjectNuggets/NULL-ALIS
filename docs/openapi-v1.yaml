  /api/v1/diagnostics/extension/status:
    get:
      summary: System-wide extension WebSocket diagnostic state
      description: |
        Returns the live system-wide state of the extension WebSocket surface:
        whether the feature is enabled, how many users are currently paired,
        and lifetime counters. Requires `X-Internal-Token` (same model as
        `/internal/diagnostics`).
      security:
        - InternalToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [enabled, total_active, connections_total, auth_failed_total]
                properties:
                  enabled:
                    type: boolean
                  total_active:
                    type: integer
                    description: Live count of currently-paired users.
                  connections_total:
                    type: integer
                    description: Lifetime extension WS upgrades accepted.
                  auth_failed_total:
                    type: integer
                    description: Lifetime auth_ack{ok:false} outcomes.
        '401':
          description: Missing or invalid internal token.
        '405':
          description: Method not allowed (only GET supported).

  /api/v1/diagnostics/extension/users/{user_id}:
    get:
      summary: Per-user extension pairing + last-command state
      description: |
        Returns whether the requested user has a live extension paired,
        when they paired, and what their last command did. Auth:
        `X-Internal-Token` (operator-only). An earlier S4 draft
        admitted an `X-Zaki-User-Id == {user_id}` self-only path —
        dropped during review because the header carries no
        credential at this boundary. In `user_cell` deployment mode
        the route additionally rejects with `403 wrong_user_cell` if
        the path's `user_id` does not match the cell's pinned user.
        The `user_id` path parameter must be alphanumeric + `_-.`
        only; anything else returns 400.
      security:
        - InternalToken: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [user_id, paired, connected_at_unix, last_command_at_unix, last_command_tool, last_command_result]
                properties:
                  user_id:
                    type: string
                  paired:
                    type: boolean
                  connected_at_unix:
                    type: integer
                    description: Seconds since epoch; 0 when not paired.
                  last_command_at_unix:
                    type: integer
                    description: Seconds since epoch; 0 when no command yet.
                  last_command_tool:
                    type: string
                    description: Empty when no command yet.
                  last_command_result:
                    type: string
                    description: One of "ok", "timeout", "conn_closed", "oom", "error_other", or empty.
        '400':
          description: Invalid user_id path parameter.
        '401':
          description: Missing or invalid internal token.
        '403':
          description: User-cell gateway is pinned to a different user.
        '405':
          description: Method not allowed (only GET supported).
        '500':
          description: Diagnostic payload rendering failed.

  # ── Planned endpoint additions (SOTA program) ──────────────────────
  #
  # The entries below are DEFERRED. They are NOT implemented in v0.1
  # and MUST NOT be called as if they were active. They are kept here
  # only as a visible design surface for frontend/integration planning.
  #
  # Direct operator controls (execution mode, permissions posture,
  # usage/cost inspection) are currently exposed as **chat slash
  # commands** in the agent runtime, not as REST endpoints. See
  # docs/online-agent-contract.md §2a for the implemented slash-command
  # surface (`/permissions`, `/mode`, `/plan`, `/review`, `/execute`,
  # `/approve`, `/usage`, `/cost`). Session-scoped REST parity exists
  # for approve and mode. Backend-owned active-turn cancel/resume is a
  # production-readiness gate and is not represented by phantom
  # /api/v1/chat/cancel or /api/v1/chat/resume paths.
  #
  # SSE event vocabulary for POST /api/v1/chat/stream (tool_start,
  # tool_result, approval_required, task_update, ...) IS implemented.
  # See docs/online-agent-contract.md for the authoritative frame schema.
  #
  # GET /api/v1/extension/ws is a WebSocket upgrade endpoint. OpenAPI
  # 3.0 doesn't model WebSocket routes natively; the contract is in
  # docs/extension-ws-contract.md and the gateway source lives in
  # src/extension_ws/server.zig. Authentication uses per-user
  # extension tokens (config: gateway.extension_tokens) — there is
  # NO legacy global-token fallback.
  #
  # GET /api/v1/users/{user_id}/tasks and GET /tasks/{task_id} are
  # IMPLEMENTED as read-only snapshots of the canonical TaskLedger
  # (WP2.2). POST /tasks/{task_id}/stop is IMPLEMENTED as queued-only
  # cancellation (WP2.5). See the operation entries below.
  #
  # Task creation over REST remains DEFERRED. New tasks are still
  # produced exclusively through the agent tool surface (`spawn`) —
  # the REST surface only observes existing tasks and cancels queued
  # ones. Live interruption of a running subagent is OUT OF SCOPE in
  # v0.1: `task_stop`, `/subagents kill`, and the REST /stop route all
  # report 409/queued-only honestly instead of pretending to kill a
  # running task.
  #
  # ── Remaining deferred items ───────────────────────────────────────
  #
  # GET /api/v1/users/{user_id}/usage is IMPLEMENTED in v0.1 as a
  # read-only snapshot of UsageRuntime (WP2.3). See the operation entry
  # below. The in-chat `/usage` and `/cost` slash commands remain the
  # interactive surface; both report the same underlying state.
  #
  # Provider pricing IS now wired (WP5.1): a small static table in
  # src/providers/pricing.zig supplies per-turn cost_usd for known
  # hosted models. Unknown models keep cost_usd at 0.0 and
  # cost_available remains false — the runtime never fabricates a
  # $0.00 price for unpriced models.
  #
  # GET /api/v1/users/{user_id}/traces and
  # GET /api/v1/users/{user_id}/traces/{run_id} are IMPLEMENTED as
  # read-only snapshots of the bounded in-process RunTraceStore
  # (WP4.1 / WP4.2). See the operation entries below.
  #
  # Still deferred:
  #   - Durable trace storage (traces survive only in-process; no
  #     disk or DB persistence).
  #   - Persistent usage ledger (durable cross-session/cross-pod totals).
  #   - Budget enforcement (hard/soft limits, alerts).
  #   - The `cost_update` SSE event (see docs/online-agent-contract.md
  #     §8 — still deferred).
  #   - Multi-slot approval queue (single-slot per session today).
  #   - Persistent generic allowlist for `/approve allow-always`.
  #   - Live subagent interruption (only queued tasks are cancellable).
  #   - Planner artifacts (persisted plans / plan ids).
  #   - Backend-owned active-turn RESUME (cancel SHIPPED 2026-05-28 as
  #     `POST /api/v1/users/{user_id}/sessions/{session_key}/cancel`;
  #     resume is intentionally not implemented — clients reconnect to
  #     `POST /api/v1/chat/stream` and read trace history via
  #     `GET /api/v1/users/{user_id}/traces/{run_id}` instead).
  #   - Full REST parity for operator slash commands beyond /approve,
  #     /mode, and /cancel.
  #   - MCP runtime metadata registry.
  #

  # ── Task read-only query surface (WP2.2, implemented) ─────────────

  /api/v1/users/{user_id}/tasks:
    get:
      summary: List spawned/detached tasks for a user
      description: >
        Returns a snapshot of the canonical task ledger for the given user.
        If no tenant runtime has been materialized (no agent work has
        happened for this user yet) the endpoint returns `{"tasks": []}`
        rather than 404.
      operationId: listUserTasks
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Task list snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/tasks/{task_id}:
    get:
      summary: Get a single task by id
      operationId: getUserTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRecord'
        '400':
          description: Malformed task_id
        '404':
          description: Task not found
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/tasks/{task_id}/stop:
    post:
      summary: Cancel a queued task (WP2.5)
      description: >
        Queued-only cancellation. Routes through
        SubagentManager.cancelQueued, which is the single source of truth
        for subagent task state. Running tasks CANNOT be interrupted in
        v0.1 — this endpoint returns 409 rather than pretending to kill
        the task. Terminal tasks (succeeded, failed, timed_out,
        cancelled, lost) also return 409. No tenant runtime is ever
        materialized on demand to answer a stop: if no runtime or
        manager exists for this user, the endpoint returns 404.


        On success the response is the updated TaskRecord snapshot
        (preferred, from TaskDelivery.getTaskSnapshot) or, if the
        canonical ledger mirror is not attached, a minimal payload
        `{"task_id": "...", "status": "cancelled"}`.
      operationId: stopUserTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task transitioned to cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRecord'
        '400':
          description: Missing or malformed task_id (empty, too long, control chars, wrong canonical shape)
        '404':
          description: Task or tenant runtime not found
        '405':
          description: Method not allowed (only POST is supported)
        '409':
          description: >
            Task cannot be cancelled — it is currently running (live
            interruption is not supported in v0.1) or already terminal.

  # ── Usage read-only summary surface (WP2.3, implemented) ──────────

  /api/v1/users/{user_id}/usage:
    get:
      summary: Token usage and cost summary for a user
      description: >
        Returns a snapshot of the per-user UsageRuntime: session totals
        (input, output, total tokens, cost in USD), turn count, and a
        per-model breakdown. If no tenant runtime has been materialized
        for this user yet (no agent work has happened), the endpoint
        returns a zero summary rather than 404. The endpoint is strictly
        read-only — it never instantiates a tenant runtime on demand.


        Provider pricing IS wired in v0.1 via a small static table
        (src/providers/pricing.zig). When the turn's model is priced,
        `session_cost_usd` reflects the real accumulated cost and
        `cost_available` becomes `true` once any non-zero cost is
        recorded. For unknown models the runtime deliberately keeps
        `cost_usd` at 0.0 and `cost_available` at `false` rather than
        fabricating a $0.00 cost. Persistent usage ledgers, budget
        enforcement, and the `cost_update` SSE event are deferred
        beyond v0.1.
      operationId: getUserUsage
      tags: [Usage]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Usage summary snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
        '405':
          description: Method not allowed (only GET is supported)

  # ── Run trace read-only surface (WP4.1 / WP4.2, implemented) ──────

  /api/v1/users/{user_id}/traces:
    get:
      summary: List recent agent runs retained in the in-process trace store
      description: >
        Returns the set of run ids currently retained in the bounded
        per-tenant RunTraceStore, along with each run's event count and
        bookend timestamps. Storage is in-memory only and bounded
        (default 64 runs × 256 events per run, deterministic eviction
        of the oldest run). If no tenant runtime has been materialized
        for this user yet the endpoint returns `{"traces": []}` rather
        than 404. The endpoint never instantiates a tenant runtime on
        demand. Durable trace storage is deferred beyond v0.1.
      operationId: listUserTraces
      tags: [Traces]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Run index snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceListResponse'
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/traces/{run_id}:
    get:
      summary: Get sanitized event timeline for a single run
      description: >
        Returns the sanitized event timeline for a single run from the
        in-process RunTraceStore. Each event contains only the public
        run-event fields already exposed over SSE (phase/state labels,
        tool names, tool_use_id, durations, success, approval risk
        levels, task status) — no raw tool payloads, no provider API
        details, and all string fields are clamped to a small per-
        event cap. Returns 404 when no tenant runtime exists for the
        user or the run is not present in the store. Run ids must be
        non-empty, ≤ 128 chars, and must not contain control
        characters or `/`.
      operationId: getUserTrace
      tags: [Traces]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - name: run_id
          in: path
          required: true
          description: Opaque run identifier (≤128 chars, no control chars, no slashes).
          schema:
            type: string
      responses:
        '200':
          description: Trace snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSnapshot'
        '400':
          description: Missing or malformed run_id
        '404':
          description: Run or tenant runtime not found
        '405':
          description: Method not allowed (only GET is supported)

