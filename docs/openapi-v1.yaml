openapi: 3.0.3
info:
  title: nullalis Gateway API
  version: "0.1"
  description: |
    Runtime HTTP API for nullalis v0.1.
    Contract baseline declaration date: 2026-03-18.

    Notes:
    - `/api/v1/*` and `/internal/*` endpoints use `X-Internal-Token` auth. In production-like mode this is always required; in local/non-production mode with no configured internal tokens, auth may be bypassed.
    - `X-Zaki-User-Id` is required for `/api/v1/chat/stream` when tenant mode is enabled.
    - `/api/v1/chat/stream` requires an explicit `session_key` by default.
    - `/webhook` auth is pairing-token based (Bearer), depending on pairing guard state.
    - Channel webhooks are unauthenticated at the internal-token layer; each route enforces its channel-specific verification/signature rules when configured.

    SOTA contract status (2026-04-17):
    - All existing endpoints below are STABLE and must not break.
    - SSE event vocabulary (`progress`, `reasoning_summary`, `tool_start`, `tool_result`,
      `approval_required`, `task_update`, `done`, etc.) is documented in
      docs/online-agent-contract.md. That document is the authoritative
      schema for frames emitted over `/api/v1/chat/stream`.
    - Direct operator controls (execution mode, permissions posture,
      usage/cost inspection) are exposed as chat slash commands in the
      agent runtime (`/permissions`, `/mode`, `/plan`, `/review`,
      `/execute`, `/approve`, `/usage`, `/cost`). REST parity is planned
      but deferred — see the "Planned endpoint additions" block below
      and docs/online-agent-contract.md §2a.
    - TODO: Task lifecycle extensions are documented in docs/agent-lifecycle-spec.md.
servers:
  - url: http://127.0.0.1:3000
    description: Local gateway

tags:
  - name: ops
  - name: internal
  - name: app
  - name: user
  - name: webhook

paths:
  # ── Stable endpoints (do not break) ───────────────────────────────
  /health:
    get:
      tags: [ops]
      summary: Liveness check
      responses:
        "200":
          description: Gateway is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value: { status: "ok" }
                degraded:
                  value: { status: "degraded" }

  /ready:
    get:
      tags: [ops]
      summary: Readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "503":
          description: Not ready or draining
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /metrics:
    get:
      tags: [ops]
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string

  /pair:
    post:
      tags: [ops]
      summary: Pair gateway and mint bearer token
      parameters:
        - in: header
          name: X-Pairing-Code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pairing succeeded
          content:
            application/json:
              schema:
                type: object
                required: [status, token]
                properties:
                  status:
                    type: string
                    example: paired
                  token:
                    type: string
        "400":
          description: Missing pairing code
        "401":
          description: Invalid pairing code
        "409":
          description: Already paired
        "429":
          description: Pairing rate-limited or locked out

  /webhook:
    post:
      tags: [webhook]
      summary: Generic webhook chat ingress
      description: |
        Pairing-token protected generic webhook endpoint.
        Authorization is expected as `Authorization: Bearer <token>` when pairing guard enforces tokens.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                message:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: Accepted or replied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "429":
          description: Rate limited

  /webhook/telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress
      description: Canonical Telegram webhook route. `/telegram` is an alias with the same behavior.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress (alias)
      description: Alias route for `/webhook/telegram`.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /whatsapp:
    get:
      tags: [webhook]
      summary: WhatsApp webhook verification challenge
      parameters:
        - in: query
          name: hub.mode
          required: false
          schema:
            type: string
        - in: query
          name: hub.verify_token
          required: false
          schema:
            type: string
        - in: query
          name: hub.challenge
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Verification challenge echo
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Verification failed
    post:
      tags: [webhook]
      summary: WhatsApp webhook ingress
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: false
          schema:
            type: string
          description: Required when a WhatsApp app secret is configured.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature (when signature enforcement is active)
        "429":
          description: Rate limited

  /slack/events:
    post:
      tags: [webhook]
      summary: Slack Events API webhook ingress
      parameters:
        - in: header
          name: X-Slack-Request-Timestamp
          required: false
          schema:
            type: string
        - in: header
          name: X-Slack-Signature
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid signature for a configured Slack endpoint
        "404":
          description: Slack account or endpoint not configured
        "429":
          description: Rate limited

  /line:
    post:
      tags: [webhook]
      summary: LINE webhook ingress
      parameters:
        - in: header
          name: X-Line-Signature
          required: false
          schema:
            type: string
          description: Required when LINE channel secret verification is enabled.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature
        "429":
          description: Rate limited

  /lark:
    post:
      tags: [webhook]
      summary: Lark webhook ingress
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed (or challenge response)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid verification token
        "429":
          description: Rate limited

  /internal/diagnostics:
    get:
      tags: [internal]
      summary: Runtime diagnostics snapshot
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalDiagnosticsResponse"
        "401":
          description: Unauthorized

  /internal/wake-heartbeat:
    post:
      tags: [internal]
      summary: Enqueue heartbeat wake
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  oneOf:
                    - type: string
                    - type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Enqueued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized

  /internal/drain:
    post:
      tags: [internal]
      summary: Enter drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/undrain:
    post:
      tags: [internal]
      summary: Exit drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/shutdown:
    post:
      tags: [internal]
      summary: Request graceful shutdown
      security:
        - InternalToken: []
      responses:
        "200":
          description: Shutdown requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/v1/chat/stream:
    post:
      tags: [app]
      summary: Chat with SSE streaming
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, session_key]
              properties:
                message:
                  type: string
                text:
                  type: string
                user_id:
                  type: string
                session_key:
                  type: string
                  description: Required explicit lane key. In tenant mode it must belong to the authenticated user and use one of `main`, `thread:<id>`, `task:<id>`, or `cron:<id>`.
      responses:
        "200":
          description: |
            SSE stream of structured run events. Frames include (non-exhaustive):
            `status`, `ready` (tenant mode), `reply_start`, `progress`,
            `reasoning_summary`, `tool_start`, `tool_result`,
            `approval_required`, `task_update`, `token`, `error`, and a
            terminal `done`. See
            [docs/online-agent-contract.md](./online-agent-contract.md) for
            the full event schema, correlation ids (`run_id`,
            `tool_use_id`), and ordering invariants.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid payload, missing `session_key`, invalid lane, wrong-user lane, or missing user header in tenant mode
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized internal token
          content:
            text/event-stream:
              schema:
                type: string
        "409":
          description: Tenant ownership lock conflict (`event:error` includes `retry_after_ms`, optional `owner_instance_id`, optional `lease_until_s`)
          content:
            text/event-stream:
              schema:
                type: string
        "503":
          description: Gateway draining
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/users/provision:
    post:
      tags: [user]
      summary: Prepare tenant user state/workspace
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
      responses:
        "200":
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Missing/invalid user_id
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/onboarding:
    get:
      tags: [user]
      summary: Get onboarding state
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Onboarding state JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    put:
      tags: [user]
      summary: Update onboarding and workspace scaffolding fields
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap: { type: string }
                identity: { type: string }
                user: { type: string }
                soul: { type: string }
                heartbeat: { type: string }
                completed: { type: boolean }
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/config:
    get:
      tags: [user]
      summary: Get user config JSON
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Config content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [user]
      summary: Patch/replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled
    put:
      tags: [user]
      summary: Replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled

  /api/v1/users/{user_id}/settings:
    get:
      tags: [user]
      summary: Get user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
    patch:
      tags: [user]
      summary: Patch user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Update user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/heartbeat:
    get:
      tags: [user]
      summary: Get user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Heartbeat config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [user]
      summary: Set user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/cron:
    get:
      tags: [user]
      summary: Get user cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Job list payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    patch:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    delete:
      tags: [user]
      summary: Clear user cron/jobs
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/secrets/{key}:
    get:
      tags: [user]
      summary: Read user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key: { type: string }
                  value: { type: string }
        "404":
          description: Secret not found
    put:
      tags: [user]
      summary: Upsert user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
    delete:
      tags: [user]
      summary: Delete user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Secret not found

  /api/v1/users/{user_id}/channels/telegram/connect:
    post:
      tags: [user]
      summary: Connect Telegram channel for user
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                account_id:
                  type: string
                bot_token:
                  type: string
                webhook_url:
                  type: string
                webhook_base_url:
                  type: string
                webhook_secret_token:
                  type: string
                allow_from:
                  type: array
                  items: { type: string }
                drop_pending_updates:
                  type: boolean
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid connect payload
        "502":
          description: Telegram API rejected connect operation

  /api/v1/users/{user_id}/channels/{channel}/bindings:
    get:
      tags: [user]
      summary: List channel identity bindings for user/channel
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: Binding list
          content:
            application/json:
              schema:
                type: object
                required: [channel, items]
                properties:
                  channel:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        account_id: { type: string }
                        principal_key: { type: string }
                        scope_key: { type: string }
                        thread_key:
                          type: string
                          nullable: true
    post:
      tags: [user]
      summary: Upsert channel identity binding for user/channel
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id, principal_key, scope_key]
              properties:
                account_id: { type: string }
                principal_key: { type: string }
                scope_key: { type: string }
                thread_key:
                  type: string
                  nullable: true
                peer_kind:
                  type: string
                  nullable: true
                peer_id:
                  type: string
                  nullable: true
                metadata_json:
                  type: string
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                type: object
                required: [status, id]
                properties:
                  status: { type: string }
                  id: { type: string }

  /api/v1/users/{user_id}/channels/{channel}/bindings/{binding_id}:
    delete:
      tags: [user]
      summary: Delete channel identity binding
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
        - $ref: "#/components/parameters/BindingIdPath"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Binding not found

  /api/v1/users/{user_id}/channels/telegram/disconnect:
    post:
      tags: [user]
      summary: Disconnect Telegram channel for user (action-style alias)
      description: |
        Supports action-style callers that prefer POST for disconnect operations.
        Behavior is identical to DELETE.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bot_token:
                  type: string
                drop_pending_updates:
                  type: boolean
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Telegram API rejected disconnect operation
    delete:
      tags: [user]
      summary: Disconnect Telegram channel for user
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bot_token:
                  type: string
                drop_pending_updates:
                  type: boolean
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Telegram API rejected disconnect operation

  # ── Planned endpoint additions (SOTA program) ──────────────────────
  #
  # The entries below are DEFERRED. They are NOT implemented in v0.1
  # and MUST NOT be called as if they were active. They are kept here
  # only as a visible design surface for frontend/integration planning.
  #
  # Direct operator controls (execution mode, permissions posture,
  # usage/cost inspection) are currently exposed as **chat slash
  # commands** in the agent runtime, not as REST endpoints. See
  # docs/online-agent-contract.md §2a for the implemented slash-command
  # surface (`/permissions`, `/mode`, `/plan`, `/review`, `/execute`,
  # `/approve`, `/usage`, `/cost`). REST parity for these controls is
  # planned but deferred beyond v0.1.
  #
  # SSE event vocabulary for POST /api/v1/chat/stream (tool_start,
  # tool_result, approval_required, task_update, ...) IS implemented.
  # See docs/online-agent-contract.md for the authoritative frame schema.
  #
  # GET /api/v1/users/{user_id}/tasks and GET /tasks/{task_id} are
  # IMPLEMENTED as read-only snapshots of the canonical TaskLedger
  # (WP2.2). POST /tasks/{task_id}/stop is IMPLEMENTED as queued-only
  # cancellation (WP2.5). See the operation entries below.
  #
  # Task creation over REST remains DEFERRED. New tasks are still
  # produced exclusively through the agent tool surface (`spawn`) —
  # the REST surface only observes existing tasks and cancels queued
  # ones. Live interruption of a running subagent is OUT OF SCOPE in
  # v0.1: `task_stop`, `/subagents kill`, and the REST /stop route all
  # report 409/queued-only honestly instead of pretending to kill a
  # running task.
  #
  # ── Remaining deferred items ───────────────────────────────────────
  #
  # GET /api/v1/users/{user_id}/usage is IMPLEMENTED in v0.1 as a
  # read-only snapshot of UsageRuntime (WP2.3). See the operation entry
  # below. The in-chat `/usage` and `/cost` slash commands remain the
  # interactive surface; both report the same underlying state.
  #
  # Provider pricing IS now wired (WP5.1): a small static table in
  # src/providers/pricing.zig supplies per-turn cost_usd for known
  # hosted models. Unknown models keep cost_usd at 0.0 and
  # cost_available remains false — the runtime never fabricates a
  # $0.00 price for unpriced models.
  #
  # GET /api/v1/users/{user_id}/traces and
  # GET /api/v1/users/{user_id}/traces/{run_id} are IMPLEMENTED as
  # read-only snapshots of the bounded in-process RunTraceStore
  # (WP4.1 / WP4.2). See the operation entries below.
  #
  # Still deferred:
  #   - Durable trace storage (traces survive only in-process; no
  #     disk or DB persistence).
  #   - Persistent usage ledger (durable cross-session/cross-pod totals).
  #   - Budget enforcement (hard/soft limits, alerts).
  #   - The `cost_update` SSE event (see docs/online-agent-contract.md
  #     §8 — still deferred).
  #   - Multi-slot approval queue (single-slot per session today).
  #   - Persistent generic allowlist for `/approve allow-always`.
  #   - Live subagent interruption (only queued tasks are cancellable).
  #   - Planner artifacts (persisted plans / plan ids).
  #   - Full REST parity for operator slash commands beyond /approve.
  #   - MCP runtime metadata registry.
  #

  # ── Task read-only query surface (WP2.2, implemented) ─────────────

  /api/v1/users/{user_id}/tasks:
    get:
      summary: List spawned/detached tasks for a user
      description: >
        Returns a snapshot of the canonical task ledger for the given user.
        If no tenant runtime has been materialized (no agent work has
        happened for this user yet) the endpoint returns `{"tasks": []}`
        rather than 404.
      operationId: listUserTasks
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Task list snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/tasks/{task_id}:
    get:
      summary: Get a single task by id
      operationId: getUserTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRecord'
        '400':
          description: Malformed task_id
        '404':
          description: Task not found
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/tasks/{task_id}/stop:
    post:
      summary: Cancel a queued task (WP2.5)
      description: >
        Queued-only cancellation. Routes through
        SubagentManager.cancelQueued, which is the single source of truth
        for subagent task state. Running tasks CANNOT be interrupted in
        v0.1 — this endpoint returns 409 rather than pretending to kill
        the task. Terminal tasks (succeeded, failed, timed_out,
        cancelled, lost) also return 409. No tenant runtime is ever
        materialized on demand to answer a stop: if no runtime or
        manager exists for this user, the endpoint returns 404.


        On success the response is the updated TaskRecord snapshot
        (preferred, from TaskDelivery.getTaskSnapshot) or, if the
        canonical ledger mirror is not attached, a minimal payload
        `{"task_id": "...", "status": "cancelled"}`.
      operationId: stopUserTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task transitioned to cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRecord'
        '400':
          description: Missing or malformed task_id (empty, too long, control chars, wrong canonical shape)
        '404':
          description: Task or tenant runtime not found
        '405':
          description: Method not allowed (only POST is supported)
        '409':
          description: >
            Task cannot be cancelled — it is currently running (live
            interruption is not supported in v0.1) or already terminal.

  # ── Usage read-only summary surface (WP2.3, implemented) ──────────

  /api/v1/users/{user_id}/usage:
    get:
      summary: Token usage and cost summary for a user
      description: >
        Returns a snapshot of the per-user UsageRuntime: session totals
        (input, output, total tokens, cost in USD), turn count, and a
        per-model breakdown. If no tenant runtime has been materialized
        for this user yet (no agent work has happened), the endpoint
        returns a zero summary rather than 404. The endpoint is strictly
        read-only — it never instantiates a tenant runtime on demand.


        Provider pricing IS wired in v0.1 via a small static table
        (src/providers/pricing.zig). When the turn's model is priced,
        `session_cost_usd` reflects the real accumulated cost and
        `cost_available` becomes `true` once any non-zero cost is
        recorded. For unknown models the runtime deliberately keeps
        `cost_usd` at 0.0 and `cost_available` at `false` rather than
        fabricating a $0.00 cost. Persistent usage ledgers, budget
        enforcement, and the `cost_update` SSE event are deferred
        beyond v0.1.
      operationId: getUserUsage
      tags: [Usage]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Usage summary snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
        '405':
          description: Method not allowed (only GET is supported)

  # ── Run trace read-only surface (WP4.1 / WP4.2, implemented) ──────

  /api/v1/users/{user_id}/traces:
    get:
      summary: List recent agent runs retained in the in-process trace store
      description: >
        Returns the set of run ids currently retained in the bounded
        per-tenant RunTraceStore, along with each run's event count and
        bookend timestamps. Storage is in-memory only and bounded
        (default 64 runs × 256 events per run, deterministic eviction
        of the oldest run). If no tenant runtime has been materialized
        for this user yet the endpoint returns `{"traces": []}` rather
        than 404. The endpoint never instantiates a tenant runtime on
        demand. Durable trace storage is deferred beyond v0.1.
      operationId: listUserTraces
      tags: [Traces]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Run index snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceListResponse'
        '405':
          description: Method not allowed (only GET is supported)

  /api/v1/users/{user_id}/traces/{run_id}:
    get:
      summary: Get sanitized event timeline for a single run
      description: >
        Returns the sanitized event timeline for a single run from the
        in-process RunTraceStore. Each event contains only the public
        run-event fields already exposed over SSE (phase/state labels,
        tool names, tool_use_id, durations, success, approval risk
        levels, task status) — no raw tool payloads, no provider API
        details, and all string fields are clamped to a small per-
        event cap. Returns 404 when no tenant runtime exists for the
        user or the run is not present in the store. Run ids must be
        non-empty, ≤ 128 chars, and must not contain control
        characters or `/`.
      operationId: getUserTrace
      tags: [Traces]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - name: run_id
          in: path
          required: true
          description: Opaque run identifier (≤128 chars, no control chars, no slashes).
          schema:
            type: string
      responses:
        '200':
          description: Trace snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSnapshot'
        '400':
          description: Missing or malformed run_id
        '404':
          description: Run or tenant runtime not found
        '405':
          description: Method not allowed (only GET is supported)

  # ── Phase 3.5 Session CRUD (implemented) ──────────────────────────

  /api/v1/users/{user_id}/sessions:
    get:
      summary: List sessions owned by user
      operationId: listUserSessions
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '500':
          description: Internal error

  /api/v1/users/{user_id}/sessions/{session_key}:
    get:
      summary: Get session info including history length
      operationId: getSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoResponse'
        '403':
          description: Session not owned by user
        '404':
          description: Session not found
    delete:
      summary: Destroy a session
      operationId: deleteSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Session deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        '403':
          description: Session not owned by user
        '404':
          description: Session not found
        '409':
          description: Session in use (active turn or concurrent reader)

  /api/v1/users/{user_id}/sessions/{session_key}/compact:
    post:
      summary: Trigger manual context compaction
      operationId: compactSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Compaction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [compacted, no_change, checkpoint_only]
                  compacted:
                    type: boolean
        '403':
          description: Session not owned by user
        '404':
          description: Session not found

  /api/v1/users/{user_id}/sessions/{session_key}/context:
    get:
      summary: Context window status (tokens used/max, history length)
      operationId: getSessionContext
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Context window snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContextResponse'
        '403':
          description: Session not owned by user
        '404':
          description: Session not found

  /api/v1/users/{user_id}/sessions/{session_key}/export:
    get:
      summary: Export session transcript as JSON
      operationId: exportSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Full transcript with session_key wrapper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionExportResponse'
        '403':
          description: Session not owned by user
        '404':
          description: Session not found
    post:
      summary: Export session transcript as JSON (POST alias)
      operationId: exportSessionPost
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Full transcript with session_key wrapper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionExportResponse'
        '403':
          description: Session not owned by user
        '404':
          description: Session not found

  /api/v1/users/{user_id}/sessions/{session_key}/history:
    get:
      summary: Get message history (BFF compatibility, no session_key wrapper)
      operationId: getSessionHistory
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Messages array only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryResponse'
        '403':
          description: Session not owned by user
        '404':
          description: Session not found

  /api/v1/users/{user_id}/sessions/{session_key}/approve:
    post:
      summary: Approve or deny the session's pending tool approval
      description: |
        Resolves the single pending approval held by the session's agent
        (see docs/online-agent-contract.md §2). `approved: true` is
        translated to `/approve allow-once` and `approved: false` to
        `/approve deny`. Generic persistent allow-always is not supported
        in v1.
      operationId: approveSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved]
              properties:
                approved:
                  type: boolean
      responses:
        '200':
          description: Approval result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, denied]
                  message:
                    type: string
        '400':
          description: Missing body or approved field
        '403':
          description: Session not owned by user
        '404':
          description: Session not found

components:
  parameters:
    UserIdPath:
      in: path
      name: user_id
      required: true
      schema:
        type: string
      description: Tenant user identifier.
    ChannelPath:
      in: path
      name: channel
      required: true
      schema:
        type: string
      description: Channel identifier (for example `telegram`, `slack`, `line`).
    BindingIdPath:
      in: path
      name: binding_id
      required: true
      schema:
        type: string
      description: Channel identity binding record id.
    SessionKeyPath:
      in: path
      name: session_key
      required: true
      schema:
        type: string
      description: >
        Canonical session key, e.g. `agent:zaki-bot:user:123:main`.
        Keys use colons as delimiters. Pass the key as-is in the URL
        path — the gateway matches on raw path segments without
        URL-decoding.
    TaskIdPath:
      in: path
      name: task_id
      required: true
      schema:
        type: string
      description: >
        Canonical task id (format `task_<11 hex digits>`, 16 chars).
        The gateway rejects task_ids containing control characters,
        `/`, or longer than 64 chars with 400 Bad Request.

  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: In production-like mode this token is required for internal and `/api/v1/*` routes. In local/non-production mode with no configured token set, auth may be bypassed.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    # ── Session CRUD schemas (Phase 3.5) ────────────────────────────
    SessionListResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            type: object
            properties:
              session_key:
                type: string
              created_at:
                type: integer
                format: int64
                description: Unix timestamp (ms)
              last_active:
                type: integer
                format: int64
                description: Unix timestamp (ms)
              turn_count:
                type: integer
                format: int64
    SessionInfoResponse:
      type: object
      properties:
        session_key:
          type: string
        created_at:
          type: integer
          format: int64
        last_active:
          type: integer
          format: int64
        turn_count:
          type: integer
          format: int64
        history_len:
          type: integer
          format: int64
    # ── Task query schemas (WP2.2) ──────────────────────────────────
    TaskRecord:
      type: object
      required: [task_id, description, status, owner_session, created_at_ms, updated_at_ms]
      properties:
        task_id:
          type: string
          description: Canonical task id, format `task_<11 hex digits>`.
        description:
          type: string
          description: Human-readable task description.
        status:
          type: string
          enum: [queued, running, succeeded, failed, timed_out, cancelled, lost]
        owner_session:
          type: string
          description: Session key that owns this task.
        created_at_ms:
          type: integer
          format: int64
          description: Unix timestamp (ms) when the task was created.
        updated_at_ms:
          type: integer
          format: int64
          description: Unix timestamp (ms) of the last state transition.
        result_summary:
          type: string
          description: Present only on terminal success.
        error_message:
          type: string
          description: Present only on terminal failure/timeout.
    TaskListResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskRecord'
    UsageModelBreakdown:
      type: object
      required: [model, input_tokens, output_tokens, total_tokens, cost_usd, turn_count]
      properties:
        model:
          type: string
          description: Provider-reported model identifier.
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        cost_usd:
          type: number
          format: double
          description: >
            USD cost accumulated across this model's turns. Populated
            from the static provider pricing table (WP5.1) when the
            model is recognized; remains 0 for unknown models.
        turn_count:
          type: integer
          format: int32
    UsageSummary:
      type: object
      required:
        - session_total_tokens
        - session_input_tokens
        - session_output_tokens
        - session_cost_usd
        - turn_count
        - models
        - cost_available
      properties:
        session_total_tokens:
          type: integer
          format: int64
        session_input_tokens:
          type: integer
          format: int64
        session_output_tokens:
          type: integer
          format: int64
        session_cost_usd:
          type: number
          format: double
          description: >
            Accumulated USD cost across all recorded turns for this
            user. Derived from the static provider pricing table
            (WP5.1); remains 0 when none of the recorded turns used a
            priced model.
        turn_count:
          type: integer
          format: int32
          description: Total number of turns recorded for this user.
        models:
          type: array
          items:
            $ref: '#/components/schemas/UsageModelBreakdown'
        cost_available:
          type: boolean
          description: >
            True when `session_cost_usd > 0`. With the static pricing
            table (WP5.1) wired in, this flips to true as soon as any
            turn uses a priced model; it remains false while only
            unpriced models have been used, rather than reporting a
            fabricated $0.00.
    TraceIndexEntry:
      type: object
      required: [run_id, event_count, first_event_ms, last_event_ms, truncated]
      properties:
        run_id:
          type: string
        event_count:
          type: integer
          format: int64
        first_event_ms:
          type: integer
          format: int64
          description: Milliseconds (Unix epoch) of the first retained event for this run.
        last_event_ms:
          type: integer
          format: int64
          description: Milliseconds (Unix epoch) of the most recent retained event.
        truncated:
          type: boolean
          description: >
            True when the per-run cap was reached and one or more of the
            oldest events were dropped from the in-memory window.
    TraceListResponse:
      type: object
      required: [traces]
      properties:
        traces:
          type: array
          items:
            $ref: '#/components/schemas/TraceIndexEntry'
    TraceEvent:
      type: object
      required: [kind, ts_ms]
      properties:
        kind:
          type: string
          enum:
            - llm_request
            - llm_response
            - tool_call_start
            - tool_call
            - turn_stage
            - task_update
            - approval_required
            - agent_end
        ts_ms:
          type: integer
          format: int64
        phase:
          type: string
        tool:
          type: string
        tool_use_id:
          type: string
        label:
          type: string
          description: Short sanitized label (reason, description, or summary). Clamped server-side.
        risk_level:
          type: string
        status:
          type: string
        task_id:
          type: string
        success:
          type: boolean
        duration_ms:
          type: integer
          format: int64
        iteration:
          type: integer
          format: int32
        exit_code:
          type: integer
          format: int32
        usage_tokens:
          type: integer
          format: int64
    TraceSnapshot:
      type: object
      required: [run_id, first_event_ms, last_event_ms, truncated, events]
      properties:
        run_id:
          type: string
        first_event_ms:
          type: integer
          format: int64
        last_event_ms:
          type: integer
          format: int64
        truncated:
          type: boolean
        events:
          type: array
          items:
            $ref: '#/components/schemas/TraceEvent'
    SessionContextResponse:
      type: object
      properties:
        history_len:
          type: integer
          format: int64
        tokens_used:
          type: integer
          format: int64
        max_history:
          type: integer
          format: int64
        token_limit:
          type: integer
          format: int64
    SessionExportResponse:
      type: object
      properties:
        session_key:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
    SessionHistoryResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
    SessionMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      additionalProperties: true
    InternalDiagnosticsResponse:
      type: object
      description: |
        Runtime snapshot for operators. Shape is additive and may include more fields.
      properties:
        runtime_mode:
          type: string
        startup_self_check:
          type: string
        effective_config_source:
          type: string
          nullable: true
        effective_config_hash:
          type: string
          nullable: true
        memory_search_enabled:
          type: boolean
          nullable: true
        memory_summarizer_enabled:
          type: boolean
          nullable: true
        provider_retries:
          type: integer
          nullable: true
        fallback_provider_count:
          type: integer
          nullable: true
        memory_vector_sync_mode:
          type: string
          nullable: true
        memory_outbox_enabled:
          type: boolean
          nullable: true
        configured_config_source:
          type: string
          nullable: true
        configured_memory_search_enabled:
          type: boolean
          nullable: true
        configured_memory_summarizer_enabled:
          type: boolean
          nullable: true
        configured_provider_retries:
          type: integer
          nullable: true
        configured_fallback_provider_count:
          type: integer
          nullable: true
        configured_memory_vector_sync_mode_requested:
          type: string
          nullable: true
        configured_memory_outbox_requested:
          type: boolean
          nullable: true
        chat_stream_require_explicit_session_key:
          type: boolean
        chat_stream_lane_counts:
          type: object
          additionalProperties:
            type: integer
