openapi: 3.0.3
info:
  title: nullalis Gateway API
  version: "0.1"
  description: |
    Runtime HTTP API for nullalis v0.1.
    Contract baseline declaration date: 2026-03-18.

    Notes:
    - `/api/v1/*` and `/internal/*` endpoints use `X-Internal-Token` auth. In production-like mode this is always required; in local/non-production mode with no configured internal tokens, auth may be bypassed.
    - `X-Zaki-User-Id` is required for `/api/v1/chat/stream` when tenant mode is enabled.
    - `/api/v1/chat/stream` requires an explicit `session_key` by default.
    - `/webhook` auth is pairing-token based (Bearer), depending on pairing guard state.
    - Channel webhooks are unauthenticated at the internal-token layer; each route enforces its channel-specific verification/signature rules when configured.

    SOTA contract status (2026-04-17):
    - All existing endpoints below are STABLE and must not break.
    - SSE event vocabulary (`progress`, `reasoning_summary`, `tool_start`, `tool_result`,
      `approval_required`, `task_update`, `done`, etc.) is documented in
      docs/online-agent-contract.md. That document is the authoritative
      schema for frames emitted over `/api/v1/chat/stream`.
    - Direct operator controls are exposed as chat slash commands in the
      agent runtime (`/permissions`, `/mode`, `/plan`, `/review`,
      `/execute`, `/approve`, `/usage`, `/cost`). Session-scoped REST
      parity exists for approval, execution mode, AND backend-owned
      active-turn cancellation:
      `/api/v1/users/{user_id}/sessions/{session_key}/approve`,
      `/api/v1/users/{user_id}/sessions/{session_key}/mode`,
      `/api/v1/users/{user_id}/sessions/{session_key}/cancel`.
      Clients must NOT assume `/api/v1/chat/cancel`, `/api/v1/chat/resume`,
      or `/api/v1/chat/approve` exists — those endpoints have never been
      shipped. Cancel is idempotent; resume is not implemented and the
      reconnect contract relies on reconnecting to `POST /api/v1/chat/stream`
      plus reading the bounded in-process trace store via
      `GET /api/v1/users/{user_id}/traces/{run_id}` (see §7 of
      docs/online-agent-contract.md).
    - Canvas/artifact CRUD, share, export, attachment upload (with
      `Idempotency-Key` dedupe), trace sharing, and the authenticated
      export download route are documented below. The artifact export
      bridge resolves through `produce_document` and supports pdf, docx,
      pptx, xlsx, and html; unknown formats return 400.
    - TODO: Task lifecycle extensions are documented in docs/agent-lifecycle-spec.md.
servers:
  - url: http://127.0.0.1:3000
    description: Local gateway

tags:
  - name: ops
  - name: internal
  - name: app
  - name: user
  - name: webhook
  - name: observability

paths:
  # ── Stable endpoints (do not break) ───────────────────────────────
  /health:
    get:
      tags: [ops]
      summary: Liveness check
      responses:
        "200":
          description: Gateway is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value: { status: "ok" }
                degraded:
                  value: { status: "degraded" }

  /ready:
    get:
      tags: [ops]
      summary: Readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "503":
          description: Not ready or draining
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /metrics:
    get:
      tags: [observability]
      summary: Prometheus metrics scrape.
      description: |
        Prometheus text exposition v0.0.4. See docs/operations/SLOs.md for
        the full metric catalog, alert PromQL, and V1 launch gates.

        No authentication is performed. The deployment must firewall this
        endpoint from the public internet.
      responses:
        '200':
          description: Prometheus text exposition.
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP nullalis_gateway_requests_total Total HTTP requests handled.
                  # TYPE nullalis_gateway_requests_total counter
                  nullalis_gateway_requests_total 42

  /pair:
    post:
      tags: [ops]
      summary: Pair gateway and mint bearer token
      parameters:
        - in: header
          name: X-Pairing-Code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pairing succeeded
          content:
            application/json:
              schema:
                type: object
                required: [status, token]
                properties:
                  status:
                    type: string
                    example: paired
                  token:
                    type: string
        "400":
          description: Missing pairing code
        "401":
          description: Invalid pairing code
        "409":
          description: Already paired
        "429":
          description: Pairing rate-limited or locked out

  /webhook:
    post:
      tags: [webhook]
      summary: Generic webhook chat ingress
      description: |
        Pairing-token protected generic webhook endpoint.
        Authorization is expected as `Authorization: Bearer <token>` when pairing guard enforces tokens.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                message:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: Accepted or replied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "429":
          description: Rate limited

  /webhook/telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress
      description: Canonical Telegram webhook route. `/telegram` is an alias with the same behavior.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress (alias)
      description: Alias route for `/webhook/telegram`.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /whatsapp:
    get:
      tags: [webhook]
      summary: WhatsApp webhook verification challenge
      parameters:
        - in: query
          name: hub.mode
          required: false
          schema:
            type: string
        - in: query
          name: hub.verify_token
          required: false
          schema:
            type: string
        - in: query
          name: hub.challenge
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Verification challenge echo
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Verification failed
    post:
      tags: [webhook]
      summary: WhatsApp webhook ingress
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: false
          schema:
            type: string
          description: Required when a WhatsApp app secret is configured.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature (when signature enforcement is active)
        "429":
          description: Rate limited

  /slack/events:
    post:
      tags: [webhook]
      summary: Slack Events API webhook ingress
      parameters:
        - in: header
          name: X-Slack-Request-Timestamp
          required: false
          schema:
            type: string
        - in: header
          name: X-Slack-Signature
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid signature for a configured Slack endpoint
        "404":
          description: Slack account or endpoint not configured
        "429":
          description: Rate limited

  /line:
    post:
      tags: [webhook]
      summary: LINE webhook ingress
      parameters:
        - in: header
          name: X-Line-Signature
          required: false
          schema:
            type: string
          description: Required when LINE channel secret verification is enabled.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature
        "429":
          description: Rate limited

  /lark:
    post:
      tags: [webhook]
      summary: Lark webhook ingress
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed (or challenge response)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid verification token
        "429":
          description: Rate limited

  /internal/diagnostics:
    get:
      tags: [internal]
      summary: Runtime diagnostics snapshot
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalDiagnosticsResponse"
        "401":
          description: Unauthorized

  /internal/wake-heartbeat:
    post:
      tags: [internal]
      summary: Enqueue heartbeat wake
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  oneOf:
                    - type: string
                    - type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Enqueued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized

  /internal/drain:
    post:
      tags: [internal]
      summary: Enter drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/undrain:
    post:
      tags: [internal]
      summary: Exit drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/shutdown:
    post:
      tags: [internal]
      summary: Request graceful shutdown
      security:
        - InternalToken: []
      responses:
        "200":
          description: Shutdown requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/v1/chat/stream:
    post:
      tags: [app]
      summary: Chat with SSE streaming
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, session_key]
              properties:
                message:
                  type: string
                text:
                  type: string
                user_id:
                  type: string
                session_key:
                  type: string
                  description: Required explicit lane key. In tenant mode it must belong to the authenticated user and use one of `main`, `thread:<id>`, `task:<id>`, or `cron:<id>`.
      responses:
        "200":
          description: |
            SSE stream of structured run events. Frames include (non-exhaustive):
            `status`, `ready` (tenant mode), `reply_start`, `progress`,
            `reasoning_summary`, `tool_start`, `tool_result`,
            `approval_required`, `task_update`, `token`, `error`, and a
            terminal `done`. See
            [docs/online-agent-contract.md](./online-agent-contract.md) for
            the full event schema, correlation ids (`run_id`,
            `tool_use_id`), and ordering invariants.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid payload, missing `session_key`, invalid lane, wrong-user lane, or missing user header in tenant mode
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized internal token
          content:
            text/event-stream:
              schema:
                type: string
        "409":
          description: Tenant ownership lock conflict (`event:error` includes `retry_after_ms`, optional `owner_instance_id`, optional `lease_until_s`)
          content:
            text/event-stream:
              schema:
                type: string
        "503":
          description: Gateway draining
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/users/provision:
    post:
      tags: [user]
      summary: Prepare tenant user state/workspace
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
      responses:
        "200":
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Missing/invalid user_id
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/onboarding:
    get:
      tags: [user]
      summary: Get onboarding state
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Onboarding state JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    put:
      tags: [user]
      summary: Update onboarding and workspace scaffolding fields
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap: { type: string }
                identity: { type: string }
                user: { type: string }
                soul: { type: string }
                heartbeat: { type: string }
                completed: { type: boolean }
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/config:
    get:
      tags: [user]
      summary: Get user config JSON
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Config content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [user]
      summary: Patch/replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled
    put:
      tags: [user]
      summary: Replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled

  /api/v1/users/{user_id}/settings:
    get:
      tags: [user]
      summary: Get user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
    patch:
      tags: [user]
      summary: Patch user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Update user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/heartbeat:
    get:
      tags: [user]
      summary: Get user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Heartbeat config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [user]
      summary: Set user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/cron:
    get:
      tags: [user]
      summary: Get user cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Job list payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    patch:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    delete:
      tags: [user]
      summary: Clear user cron/jobs
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/secrets/{key}:
    get:
      tags: [user]
      summary: Read user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key: { type: string }
                  value: { type: string }
        "404":
          description: Secret not found
    put:
      tags: [user]
      summary: Upsert user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
    delete:
      tags: [user]
      summary: Delete user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Secret not found

  # ── Integrations inventory (S7 follow-up, read-only) ───────────────
  # Operator-managed integrations (Composio / OpenAPI connectors / MCP
  # client). Read-only status only — NOT user self-service. No secret
  # values are exposed (Composio reports key_present; OpenAPI reports
  # auth_required; MCP reports name + transport).
  /api/v1/users/{user_id}/integrations:
    get:
      tags: [user]
      summary: Read-only operator-managed integrations status
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Integrations inventory
          content:
            application/json:
              schema:
                type: object
                required: [integrations]
                properties:
                  integrations:
                    type: array
                    items:
                      type: object
                      required: [kind, label, configured, user_manageable, managed_by]
                      properties:
                        kind:
                          type: string
                          enum: [composio, openapi, mcp_client]
                        label: { type: string }
                        configured: { type: boolean }
                        user_manageable:
                          type: boolean
                          description: Always false in V1 — these are operator-managed.
                        managed_by: { type: string, example: operator }
                        count: { type: integer, description: "openapi / mcp_client only" }
                        detail:
                          type: object
                          description: "composio only — {entity_id, key_present}"
                        items:
                          type: array
                          description: "openapi: {id, mode, auth_required}; mcp_client: {name, transport}"
                          items:
                            type: object

  # ── Provider profiles (S7 follow-up) ───────────────────────────────
  # User-managed OpenAI-compatible / BYOK provider endpoints. The API key
  # is stored in the encrypted vault under provider_<id>_api_key; the
  # control plane never returns the value — only a secret_ref presence
  # flag. Postgres state backend required (else 501).
  /api/v1/users/{user_id}/providers:
    get:
      tags: [user]
      summary: List provider profiles
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Profiles
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderProfile"
        "501":
          description: State backend (Postgres) not wired
    post:
      tags: [user]
      summary: Create a provider profile
      description: |
        Validates provider_kind (allowlist), base_url (https or
        http://localhost), auth_style, the API key, and the model allowlist
        (+ default_model membership). Stores the key in the vault and
        returns the profile (key value NEVER echoed).
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_kind, base_url, api_key]
              properties:
                label: { type: string }
                provider_kind:
                  type: string
                  enum: [openai_compatible, openai, anthropic, azure_openai, gemini, deepseek, moonshot, together, openrouter, groq, custom]
                base_url: { type: string, description: "https:// or http://localhost" }
                auth_style:
                  type: string
                  enum: [bearer, api_key_header, query_param]
                  default: bearer
                api_key: { type: string, writeOnly: true }
                model_allowlist:
                  type: array
                  items: { type: string }
                default_model: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "400":
          description: |
            Validation error. Body: {error} — one of missing_provider_kind,
            invalid_provider_kind, missing_base_url, invalid_base_url,
            invalid_auth_style, missing_api_key, invalid_api_key,
            invalid_model, invalid_default_model, default_model_not_in_allowlist,
            invalid_label.
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/providers/{profile_id}:
    get:
      tags: [user]
      summary: Get a provider profile
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "400":
          description: invalid_profile_id
        "404":
          description: provider_not_found
        "501":
          description: State backend (Postgres) not wired
    patch:
      tags: [user]
      summary: Update a provider profile (PUT alias)
      description: |
        All fields optional. policy_state accepts only active|disabled
        (blocked is operator-only). Supplying api_key rotates the vault
        secret.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
                base_url: { type: string }
                auth_style: { type: string, enum: [bearer, api_key_header, query_param] }
                model_allowlist: { type: array, items: { type: string } }
                default_model: { type: string }
                policy_state: { type: string, enum: [active, disabled] }
                api_key: { type: string, writeOnly: true }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "400":
          description: validation error (see POST) or invalid_policy_state
        "404":
          description: provider_not_found
        "501":
          description: State backend (Postgres) not wired
    delete:
      tags: [user]
      summary: Delete a provider profile (and its vault key)
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [status, id]
                properties:
                  status: { type: string, example: deleted }
                  id: { type: string }
        "404":
          description: provider_not_found
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/providers/{profile_id}/test:
    post:
      tags: [user]
      summary: Test a provider profile (structural credential check)
      description: |
        V1 test is deterministic and offline-safe: base_url valid + API
        key present/well-formed + default_model in allowlist + policy not
        blocked. Records last_test and returns the refreshed profile. A
        live provider round-trip is a documented follow-up. last_test.detail
        ∈ credentials_present | invalid_base_url | missing_api_key |
        malformed_api_key | default_model_not_in_allowlist | policy_blocked.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Refreshed profile with last_test populated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "400":
          description: invalid_profile_id
        "404":
          description: provider_not_found
        "501":
          description: State backend (Postgres) not wired

  # ── Extension device registry (S7 follow-up) ───────────────────────
  # User-facing browser-extension device management. Distinct from the
  # operator diagnostics surface (/api/v1/diagnostics/extension/*). Pair /
  # inventory / revoke + last-command and timeout-derived connection
  # state. NOTE: this is the management/observability layer. Binding
  # per-device token issuance + revoke ENFORCEMENT into the WS auth path
  # (extension_ws/auth.zig) + mock-hub E2E is a documented follow-up; the
  # WS auth model today is operator-provisioned per-user tokens.
  /api/v1/users/{user_id}/extension/devices:
    get:
      tags: [user]
      summary: List the user's browser-extension devices
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Device inventory
          content:
            application/json:
              schema:
                type: object
                required: [devices]
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExtensionDevice"
        "501":
          description: State backend (Postgres) not wired
    post:
      tags: [user]
      summary: Pair (register) a new device
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: Optional display label, e.g. "Work laptop".
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                type: object
                required: [device_id, label, status, connection_state]
                properties:
                  device_id: { type: string }
                  label: { type: string }
                  status: { type: string, example: active }
                  connection_state: { type: string, example: never_connected }
        "400":
          description: invalid_label
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/extension/devices/{device_id}:
    delete:
      tags: [user]
      summary: Revoke a device (alias for the revoke action)
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: device_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                required: [status, device_id]
                properties:
                  status: { type: string, example: revoked }
                  device_id: { type: string }
        "400":
          description: invalid_device_id
        "404":
          description: device_not_found
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/extension/devices/{device_id}/revoke:
    post:
      tags: [user]
      summary: Revoke a device
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: device_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                required: [status, device_id]
                properties:
                  status: { type: string }
                  device_id: { type: string }
        "400":
          description: invalid_device_id
        "404":
          description: device_not_found
        "501":
          description: State backend (Postgres) not wired

  # ── Memory governance control plane (S7 follow-up) ─────────────────
  # User-facing privacy/data primitives over the nullalis memory store.
  # All user-scoped. Postgres state backend required (else 501).
  /api/v1/users/{user_id}/memory/governance:
    get:
      tags: [user]
      summary: Memory provenance counts (total + PII per category)
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                type: object
                required: [total, pii]
                properties:
                  total: { type: integer }
                  pii:
                    type: object
                    properties:
                      phone: { type: integer }
                      email: { type: integer }
                      all: { type: integer }
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/memory/forget:
    post:
      tags: [user]
      summary: Forget one memory by id/key
      description: |
        Deterministic, audited forget of a single memory by its stable
        id/key. Topic-substring purge is intentionally NOT exposed here —
        it stays an agent-only lever (memory_purge_topic).
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key: { type: string }
      responses:
        "200":
          description: Forget result
          content:
            application/json:
              schema:
                type: object
                required: [key, forgotten]
                properties:
                  key: { type: string }
                  forgotten: { type: boolean }
        "400":
          description: missing_key
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/memory/purge-pii:
    post:
      tags: [user]
      summary: PII purge (dry-run or apply) for phone/email/all
      description: |
        V1 PII detector scope is phone + email (+ all = union). dry_run
        true returns the candidate count + a bounded sample of affected
        keys WITHOUT deleting. dry_run false (or omitted) deletes and
        returns the deleted count. Name/address are out of scope.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  type: string
                  enum: [phone, email, all]
                dry_run:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Purge result
          content:
            application/json:
              schema:
                type: object
                required: [category, dry_run, candidate_count, deleted, sample_keys]
                properties:
                  category: { type: string }
                  dry_run: { type: boolean }
                  candidate_count: { type: integer }
                  deleted:
                    type: integer
                    nullable: true
                    description: null on a dry run; count deleted on apply.
                  sample_keys:
                    type: array
                    items: { type: string }
                  sample_truncated: { type: boolean }
        "400":
          description: missing_category | invalid_category
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/memory/export:
    get:
      tags: [user]
      summary: Export all memories with provenance
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Full memory dump
          content:
            application/json:
              schema:
                type: object
                required: [user_id, count, exported_at_s, memories]
                properties:
                  user_id: { type: integer }
                  count: { type: integer }
                  exported_at_s: { type: integer, format: int64 }
                  memories:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        key: { type: string }
                        category: { type: string }
                        timestamp: { type: string }
                        lane: { type: string }
                        session_id: { type: string, nullable: true }
                        valid_to: { type: integer, format: int64, nullable: true }
                        content: { type: string }
        "501":
          description: State backend (Postgres) not wired

  # ── Channel activation control plane (S7) ──────────────────────────
  # User-facing self-service setup for the V1 launch channels. Credentials
  # are written to the encrypted secret vault; only secret *refs*
  # (present: bool) are ever read back. Surfaced channel set is the fixed
  # allowlist {slack, discord, email, whatsapp}; telegram appears
  # read-only in the listing and keeps its dedicated connect/disconnect
  # routes (a generic mutate on telegram returns 409). Every other adapter
  # returns 404 channel_not_supported.
  /api/v1/users/{user_id}/channels:
    get:
      tags: [user]
      summary: List channel activation status for the V1 launch channels
      description: |
        Aggregate control-plane status for slack, discord, email, whatsapp
        (user-managed) and telegram (read-only). Never returns secret
        values — each secret is reported as a `present: bool` ref.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Channel status list
          content:
            application/json:
              schema:
                type: object
                required: [channels]
                properties:
                  channels:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChannelControlStatus"
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/channels/{channel}:
    get:
      tags: [user]
      summary: Get activation status for a single channel
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: Channel status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelControlStatus"
        "404":
          description: channel_not_supported (hidden/unknown adapter)
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/channels/{channel}/connect:
    post:
      tags: [user]
      summary: Connect (store vault credentials + config) for a channel
      description: |
        Validates the provider-specific required secrets and config fields,
        writes secrets to the encrypted vault, and persists non-secret
        connection metadata. Returns the refreshed channel status (secret
        values are NEVER echoed). Required fields per channel:
          * slack:    slack_bot_token (xoxb-…), slack_signing_secret
          * discord:  discord_bot_token
          * email:    email_imap_password, imap_host, smtp_host, username
          * whatsapp: whatsapp_access_token, whatsapp_verify_token,
                      phone_number_id
        Telegram is NOT accepted here (409 — use the dedicated route).
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: |
                Channel-specific secret + config fields. Secret keys
                (e.g. slack_bot_token) and config keys (e.g. imap_host)
                are flat top-level string properties.
      responses:
        "200":
          description: Connected — refreshed channel status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelControlStatus"
        "400":
          description: |
            Validation error. Body: {error, key} where error is one of
            missing_required_secret, invalid_secret, missing_required_config,
            invalid_config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelControlFieldError"
        "404":
          description: channel_not_supported
        "409":
          description: telegram_uses_dedicated_routes or channel_disabled_in_build
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/channels/{channel}/test:
    post:
      tags: [user]
      summary: Test a channel's stored credentials (structural check)
      description: |
        V1 test is a deterministic structural check — it verifies every
        required secret is present in the vault and well-formed, records
        the result as `last_test`, and returns the refreshed status. It
        does NOT make a live outbound call to the provider (documented
        follow-up) so it never reports a false positive requiring the
        network. Telegram is read-only here (409).
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: |
            Refreshed status with last_test populated. last_test.detail is
            machine-readable: credentials_present | missing_required_secret:<key>
            | malformed_secret:<key>.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelControlStatus"
        "404":
          description: channel_not_supported
        "409":
          description: telegram_uses_dedicated_routes
        "501":
          description: State backend (Postgres) not wired

  /api/v1/users/{user_id}/channels/{channel}/disconnect:
    post:
      tags: [user]
      summary: Disconnect a channel (delete vault secrets + metadata)
      description: |
        Idempotently deletes every vault secret the channel owns and
        clears its connection metadata. POST and DELETE are equivalent.
        Telegram is read-only here (409 — use the dedicated route).
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                required: [status, channel]
                properties:
                  status: { type: string, example: disconnected }
                  channel: { type: string }
        "404":
          description: channel_not_supported
        "409":
          description: telegram_uses_dedicated_routes
        "501":
          description: State backend (Postgres) not wired
    delete:
      tags: [user]
      summary: Disconnect a channel (alias for POST)
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                required: [status, channel]
                properties:
                  status: { type: string }
                  channel: { type: string }

  /api/v1/users/{user_id}/channels/telegram/connect:
    post:
      tags: [user]
      summary: Connect Telegram channel for user
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                account_id:
                  type: string
                bot_token:
                  type: string
                webhook_url:
                  type: string
                webhook_base_url:
                  type: string
                webhook_secret_token:
                  type: string
                allow_from:
                  type: array
                  items: { type: string }
                drop_pending_updates:
                  type: boolean
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid connect payload
        "502":
          description: Telegram API rejected connect operation

  /api/v1/users/{user_id}/channels/{channel}/bindings:
    get:
      tags: [user]
      summary: List channel identity bindings for user/channel
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      responses:
        "200":
          description: Binding list
          content:
            application/json:
              schema:
                type: object
                required: [channel, items]
                properties:
                  channel:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        account_id: { type: string }
                        principal_key: { type: string }
                        scope_key: { type: string }
                        thread_key:
                          type: string
                          nullable: true
    post:
      tags: [user]
      summary: Upsert channel identity binding for user/channel
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ChannelPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id, principal_key, scope_key]
              properties:
                account_id: { type: string }
