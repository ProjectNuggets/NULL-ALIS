  /api/v1/users/{user_id}/sessions/{session_key}/approve:
    post:
      summary: Approve or deny the session's pending tool approval
      description: |
        Resolves the single pending approval held by the session's agent
        (see docs/online-agent-contract.md §2). `approved: true` is
        translated to `/approve allow-once` and `approved: false` to
        `/approve deny`. Generic persistent allow-always is not
        supported in v1; the legacy slash-command `/exec` flow uses a
        separate operator-only path (Gate 3, not surfaced here).

        Supervised mode auto-approves only local editable artifact writes
        (`artifact_create`, `artifact_update`). Public artifact sharing
        (`artifact_share`), rendered file generation (`produce_document`),
        shell, filesystem writes, browser/session tools, integrations,
        unknown/MCP tools, and other mutating tools still use this pending
        approval flow when policy requires confirmation.

        Sprint 2 (prod-readiness 2026-05-28) — stable approval id +
        stale-card guard:

          * Each pending approval carries a stable `approval_id` of
            the form `apr-<u64>`. The FE pins to it when rendering the
            approval card, then echoes it back in the request body.
          * When `approval_id` is supplied, the gateway verifies it
            against the agent's current pending. Mismatch (a NEW
            approval slot took over after the card was rendered, or the
            slot is empty) yields **409 Conflict** with
            `{"error":"approval_id_mismatch", ...}`. The FE should
            refresh session detail and retry.
          * When `approval_id` is omitted (or sent empty), the gateway
            addresses the current pending without verification — the
            pre-Sprint-2 behavior. This is the back-compat path for
            older clients; new clients should always send the id.
      operationId: approveSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved]
              properties:
                approved:
                  type: boolean
                approval_id:
                  type: string
                  pattern: '^apr-[0-9]+$'
                  description: |
                    Stable wire id of the approval card being resolved.
                    Format `apr-<u64>`. When present, must match the
                    current pending or the request is rejected with 409.
                    Omit or send empty for backwards-compatible
                    addressed-current-pending behavior.
      responses:
        '200':
          description: Approval result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, denied]
                  message:
                    type: string
        '400':
          description: Missing body or approved field
        '403':
          description: Session not owned by user
        '404':
          description: Session not found
        '409':
          description: |
            `approval_id` was supplied but does not match the agent's
            current pending approval (the slot is empty or holds a
            different id). The pending — if any — is left untouched;
            the FE should refresh `GET /sessions/{session_key}` and
            present whichever card is current.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [approval_id_mismatch]
                  hint:
                    type: string

  /api/v1/users/{user_id}/sessions/{session_key}/mode:
    post:
      summary: Set the active session execution mode
      description: |
        Routes through the canonical `/mode` slash-command handler so chat
        commands and UI controls share one behavior path. Applies to the
        live session only; persisted/evicted sessions do not have a live
        agent process and return 404.
      operationId: setSessionMode
      tags: [Sessions]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [plan, review, execute, background]
      responses:
        '200':
          description: Mode changed
          content:
            application/json:
              schema:
                type: object
                required: [mode, message]
                properties:
                  mode:
                    type: string
                    enum: [plan, review, execute, background]
                  message:
                    type: string
        '400':
          description: Missing body, invalid JSON, or invalid mode
        '403':
          description: Session not owned by user
        '404':
          description: Session not found or no live session manager

  /api/v1/users/{user_id}/sessions/{session_key}/cancel:
    post:
      summary: Cancel the session's active agent turn (P0 — 2026-05-28)
      description: |
        Backend-owned active-turn cancellation. Signals the session
        agent's atomic `CancellationToken`; the agent loop polls
        between iterations and exits early with a `[Cancelled]`-prefixed
        reply, an SSE `system_notice { kind: "turn_cancelled" }`, and
        the canonical `progress { phase: "finalize", state: "done" }`
        frame followed by `done`.

        Idempotent:
          - Repeated cancels produce the same `cancellation_signalled`
            response. The atomic store is a no-op on an already-set
            flag.
          - A cancel against an idle session is safe; the agent resets
            the token at the start of every turn, so a stale cancel
            cannot silently cancel a future user message. The response
            sets `was_active: false` so the FE can tell the user that
            no real work was interrupted.

        Production gate: the FE Stop button MUST bind to this route.
        Client-side `fetch().abort()` alone is insufficient — without
        this route the server-side run keeps consuming tokens, tool
        side-effects, and meter receipts after the client disconnects.
      operationId: cancelSession
      tags: [Sessions]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/SessionKeyPath'
      responses:
        '200':
          description: Cancellation signalled
          content:
            application/json:
              schema:
                type: object
                required: [status, session_key, was_active]
                properties:
                  status:
                    type: string
                    enum: [cancellation_signalled]
                  session_key:
                    type: string
                  was_active:
                    type: boolean
                    description: True when the session had an in-flight active reference at cancel time; false when the session was idle.
        '403':
          description: Session not owned by user
        '404':
          description: Session not found
        '405':
          description: Method not allowed (only POST is supported)

  /api/v1/users/{user_id}/attachments:
    post:
      summary: Upload a base64-encoded attachment to the user workspace
      description: |
        Writes the decoded bytes to `{workspace}/attachments/{filename}`.
        The agent then reads the attachment via the `file_read` tool
        with path `attachments/{filename}` (per-user scoping is
        guaranteed by the workspace boundary; no cross-user paths can
        be reached).

        Filename safety:
          - `..` segments, `/`, hidden files, and control characters
            are rejected with 400.
        Size caps:
          - base64 input <= 27 MB.
          - decoded bytes <= 20 MB (matches multimodal cap).

        Idempotency (D7 closure, 2026-05-28):
          - `Idempotency-Key` header is honored in soft mode: when
            absent, the upload proceeds normally (existing-client
            compatibility).
          - When present, a retry with the same key returns the same
            response body verbatim from the in-memory cache and does
            NOT re-write the file. A different filename or content
            attached to the same key still returns the FIRST upload's
            response — at-most-once semantics protect against unsafe
            overwrite.
          - Empty / oversized (`> 256`) keys return 400.
          - Error responses are NOT cached, so a transient 5xx does
            not lock the client out of retrying.
      operationId: uploadUserAttachment
      tags: [Attachments]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 256
          description: Optional dedupe key. Retries with the same key return the same response body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_b64]
              properties:
                filename:
                  type: string
                  description: Must pass isSafeAttachmentFilename (no `..`, `/`, hidden, control chars).
                content_b64:
                  type: string
                  description: Standard base64 encoding of the file bytes (decoded size <= 20 MB).
      responses:
        '200':
          description: Attachment written or idempotency hit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentUploadResponse'
        '400':
          description: Missing body, missing field, unsafe filename, invalid base64, or invalid Idempotency-Key
        '413':
          description: Attachment too large
        '500':
          description: Filesystem or allocation failure

  /api/v1/users/{user_id}/artifacts:
    get:
      summary: List artifacts owned by user
      operationId: listUserArtifacts
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '503':
          description: Persistent state backend not configured

  /api/v1/users/{user_id}/artifacts/{artifact_id}:
    get:
      summary: Get the latest version of an artifact
      operationId: getUserArtifact
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/ArtifactIdPath'
      responses:
        '200':
          description: Artifact metadata + latest version content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
        '400':
          description: Malformed artifact_id
        '404':
          description: Artifact not found
        '503':
          description: Persistent state backend not configured
    put:
      summary: Append a new version of an artifact (user edit)
      operationId: putUserArtifact
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/ArtifactIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                change_summary:
                  type: string
      responses:
        '200':
          description: New version appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
        '400':
          description: Missing body or invalid payload
        '404':
          description: Artifact not found
        '503':
          description: Persistent state backend not configured

  /api/v1/users/{user_id}/artifacts/{artifact_id}/share:
    post:
      summary: Mint a public share URL for an artifact
      description: |
        Returns `share_url` rooted at `/api/v1/share/artifact/{code}`.
        Default TTL 7 days; max 30 days. Per-user share-spam cap of
        100 live shares (D64); when hit, returns 429 with
        `share_limit_reached`.
      operationId: shareUserArtifact
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/ArtifactIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_hours:
                  type: integer
                  minimum: 1
                  maximum: 720
                  description: Time-to-live in hours. Defaults to 168 (7 days); max 720 (30 days).
      responses:
        '200':
          description: Share minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactShareResponse'
        '404':
          description: Artifact not found
        '429':
          description: Per-user share-spam cap reached
          content:
            application/json:
              examples:
                share_limit_reached:
                  value: { error: share_limit_reached, detail: "Revoke an existing share before minting another." }
        '503':
          description: Persistent state backend not configured
    delete:
      summary: Revoke an artifact's share URL
      operationId: revokeUserArtifactShare
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/ArtifactIdPath'
      responses:
        '200':
          description: Share revoked (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Artifact not found
        '503':
          description: Persistent state backend not configured

  /api/v1/users/{user_id}/artifacts/{artifact_id}/export:
    post:
      summary: Export an artifact through produce_document (Wave 2A — 2026-05-28)
      description: |
        Calls `ProduceDocumentTool.execute()` with the safe `default`
        theme and the artifact's latest content. Branding is operator-
        owned and applies automatically when configured; the user
        cannot pick `thmanyah` via this endpoint.

        Renderer-missing failures surface as `502 renderer_unavailable`
        with the install hint embedded in `detail`. Format must be one
        of `pdf|docx|pptx|xlsx|html`; anything else returns 400.

        Response shape includes both `url` and `download_url`, both
        pointing at `GET /api/v1/users/{user_id}/exports/{filename}`
        for a user-scoped binary download with the right Content-Type.
      operationId: exportUserArtifact
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/ArtifactIdPath'
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [pdf, docx, pptx, xlsx, html]
            default: pdf
      responses:
        '200':
          description: Export produced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactExportResponse'
        '400':
          description: Invalid artifact id or unsupported format
        '404':
          description: Artifact or version not found
        '500':
          description: Render or write failure (when not renderer-missing)
        '502':
          description: Renderer binary missing in image (renderer_unavailable)
        '503':
          description: Persistent state backend not configured

  /api/v1/users/{user_id}/exports/{filename}:
    get:
      summary: Stream a single produced export file (Wave 2A — 2026-05-28)
      description: |
        Serves `{workspace}/attachments/produced/{filename}` with a
        Content-Type derived from the filename extension. The route is
        user-scoped via UserContext upstream of dispatch and
        filename-traversal guarded by isSafeAttachmentFilename.
      operationId: getUserExport
      tags: [Artifacts]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - in: path
          name: filename
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File bytes with appropriate Content-Type
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.wordprocessingml.document: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.presentationml.presentation: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } }
            text/html: { schema: { type: string } }
        '400':
          description: Unsafe filename (e.g. ..-traversal)
        '404':
          description: Export not found
        '500':
          description: I/O or alloc failure

  /api/v1/users/{user_id}/traces/{run_id}/share:
    post:
      summary: Mint a public share URL for a run trace
      description: |
        Public trace viewer at `/api/v1/share/{share_code}`. Server-
        side sanitizer strips secrets before exposing events; the
        endpoint never reveals raw provider payloads or tool outputs
        beyond the same allowlisted public field subset used by
        `GET /api/v1/users/{user_id}/traces/{run_id}` (see §7 of
        docs/online-agent-contract.md).
      operationId: shareUserTrace
      tags: [Traces]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Share minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceShareResponse'
        '404':
          description: Run not present in in-process trace store
        '429':
          description: Per-user share-spam cap reached
    delete:
      summary: Revoke a previously minted run-trace share
      operationId: revokeUserTraceShare
      tags: [Traces]
      security:
        - InternalToken: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Share revoked (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Share not found

  /api/v1/share/{share_code}:
    get:
      summary: Public viewer for a shared run trace (no auth)
      operationId: getSharedTrace
      tags: [Traces]
      parameters:
        - in: path
          name: share_code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sanitized trace view
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Share not found or expired

  /api/v1/share/artifact/{share_code}:
    get:
      summary: Public viewer for a shared artifact (no auth)
      operationId: getSharedArtifact
      tags: [Artifacts]
      parameters:
        - in: path
          name: share_code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sanitized artifact view (title + kind + content + updated_at)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Share not found or expired

components:
  parameters:
    UserIdPath:
      in: path
      name: user_id
      required: true
      schema:
        type: string
      description: Tenant user identifier.
    ChannelPath:
      in: path
      name: channel
      required: true
      schema:
        type: string
      description: Channel identifier (for example `telegram`, `slack`, `line`).
    BindingIdPath:
      in: path
      name: binding_id
      required: true
      schema:
        type: string
      description: Channel identity binding record id.
    SessionKeyPath:
      in: path
      name: session_key
      required: true
      schema:
        type: string
      description: >
        Canonical session key, e.g. `agent:zaki-bot:user:123:main`.
        Keys use colons as delimiters. Pass the key as-is in the URL
        path — the gateway matches on raw path segments without
        URL-decoding.
    TaskIdPath:
      in: path
      name: task_id
      required: true
      schema:
        type: string
      description: >
        Canonical task id (format `task_<11 hex digits>`, 16 chars).
        The gateway rejects task_ids containing control characters,
        `/`, or longer than 64 chars with 400 Bad Request.
    ArtifactIdPath:
      in: path
      name: artifact_id
      required: true
      schema:
        type: string
      description: >
        Canonical artifact id (uuid-shaped, validated by
        isValidArtifactId). Malformed ids return 400 before any DB
        touch.

  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: In production-like mode this token is required for internal and `/api/v1/*` routes. In local/non-production mode with no configured token set, auth may be bypassed.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    # ── Session CRUD schemas (Phase 3.5) ────────────────────────────
    SessionListResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            type: object
            properties:
              session_key:
                type: string
              created_at:
                type: integer
                format: int64
                description: Unix timestamp (ms)
              last_active:
                type: integer
                format: int64
                description: Unix timestamp (ms)
              turn_count:
                type: integer
                format: int64
    SessionInfoResponse:
      type: object
      properties:
        session_key:
          type: string
        created_at:
          type: integer
          format: int64
        last_active:
          type: integer
          format: int64
        turn_count:
          type: integer
          format: int64
        history_len:
          type: integer
          format: int64
        pending_approval_count:
          type: integer
          format: int32
          description: |
            Count of items in `pending_approvals` (0 or 1 in V1 — the
            agent runs a single-slot model). Provided as a quick
            existence signal for FE list views that don't expand the
            full array.
        pending_approvals:
          type: array
          description: |
            Sprint 2 (2026-05-28) — at most one pending approval card
            per session. Empty when nothing is pending.
          items:
            $ref: '#/components/schemas/PendingApprovalCard'
    PendingApprovalCard:
      type: object
      description: |
        Sprint 2 (2026-05-28) — canonical approval-card shape the FE
        binds to. The `approval_id` is the stable wire id (`apr-<u64>`)
        the FE pins to and echoes back in
        `POST /api/v1/users/{user_id}/sessions/{session_key}/approve`.
        `id` is the underlying agent counter (numeric) kept for the
        slash-command compatibility surface; new clients should not
        depend on it. `created_at` powers the UI "waiting Ns" countdown;
        `expires_at` is null in V1 (no TTL sweep) — the schema slot is
        committed here so a V1.x TTL implementation surfaces without
        another schema bump.

        `tool_call_id` (Sprint 2 code-review fix #2) is the provider
        tool-use id that triggered the approval, when present. Lets the
        FE correlate the approval card with the `tool_use` SSE event the
        chat stream emitted before the gate fired. Null when the
        provider did not supply one (e.g. for slash-command-induced
        approvals).
      required: [approval_id, id, tool, tool_call_id, reason, risk_level, created_at, expires_at]
      properties:
        approval_id:
          type: string
          pattern: '^apr-[0-9]+$'
          description: Stable wire id of the approval card.
        id:
          type: integer
          format: int64
          description: |
            Legacy per-agent counter id (also embedded in
            `approval_id`). Kept for slash-command compatibility; FE
            clients should pin to `approval_id`.
        tool:
          type: string
          description: Tool name awaiting approval.
        tool_call_id:
          type: string
          nullable: true
          description: |
            Provider-emitted tool-use correlation id. Null when the
            provider did not supply one (slash-command-induced
            approvals, providers that omit the field). Use to bind the
            approval card to the matching `tool_use` SSE event.
        reason:
          type: string
          description: Human-readable reason the approval was requested.
        risk_level:
          type: string
          enum: [low, medium, high]
        created_at:
          type: integer
          format: int64
          description: Unix epoch seconds when the approval was set.
        expires_at:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix epoch seconds when the approval auto-expires. Always
            null in V1 — no runtime TTL sweep yet. Surfaces here so
            countdown UX can render once V1.x lands.
    # ── Task query schemas (WP2.2) ──────────────────────────────────
    TaskRecord:
      type: object
      required: [task_id, description, status, owner_session, created_at_ms, updated_at_ms]
      properties:
        task_id:
          type: string
          description: Canonical task id, format `task_<11 hex digits>`.
        description:
          type: string
          description: Human-readable task description.
        status:
          type: string
          enum: [queued, running, succeeded, failed, timed_out, cancelled, lost]
        owner_session:
          type: string
          description: Session key that owns this task.
        created_at_ms:
          type: integer
          format: int64
          description: Unix timestamp (ms) when the task was created.
        updated_at_ms:
          type: integer
          format: int64
          description: Unix timestamp (ms) of the last state transition.
        result_summary:
          type: string
          description: Present only on terminal success.
        error_message:
          type: string
          description: Present only on terminal failure/timeout.
    TaskListResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskRecord'
    UsageModelBreakdown:
      type: object
      required: [model, input_tokens, output_tokens, total_tokens, cost_usd, turn_count]
      properties:
        model:
          type: string
          description: Provider-reported model identifier.
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        cost_usd:
          type: number
          format: double
          description: >
            USD cost accumulated across this model's turns. Populated
            from the static provider pricing table (WP5.1) when the
            model is recognized; remains 0 for unknown models.
        turn_count:
          type: integer
          format: int32
    UsageSummary:
      type: object
      required:
        - session_total_tokens
        - session_input_tokens
        - session_output_tokens
        - session_cost_usd
        - turn_count
        - models
        - cost_available
      properties:
        session_total_tokens:
          type: integer
          format: int64
        session_input_tokens:
          type: integer
          format: int64
        session_output_tokens:
          type: integer
          format: int64
        session_cost_usd:
          type: number
          format: double
          description: >
            Accumulated USD cost across all recorded turns for this
            user. Derived from the static provider pricing table
            (WP5.1); remains 0 when none of the recorded turns used a
            priced model.
        turn_count:
          type: integer
          format: int32
          description: Total number of turns recorded for this user.
        models:
          type: array
          items:
            $ref: '#/components/schemas/UsageModelBreakdown'
        cost_available:
          type: boolean
          description: >
            True when `session_cost_usd > 0`. With the static pricing
            table (WP5.1) wired in, this flips to true as soon as any
            turn uses a priced model; it remains false while only
            unpriced models have been used, rather than reporting a
            fabricated $0.00.
    TraceIndexEntry:
      type: object
      required: [run_id, event_count, first_event_ms, last_event_ms, truncated]
      properties:
        run_id:
          type: string
        event_count:
          type: integer
          format: int64
        first_event_ms:
          type: integer
          format: int64
          description: Milliseconds (Unix epoch) of the first retained event for this run.
        last_event_ms:
          type: integer
          format: int64
          description: Milliseconds (Unix epoch) of the most recent retained event.
        truncated:
          type: boolean
          description: >
            True when the per-run cap was reached and one or more of the
            oldest events were dropped from the in-memory window.
    TraceListResponse:
      type: object
      required: [traces]
      properties:
        traces:
          type: array
          items:
            $ref: '#/components/schemas/TraceIndexEntry'
    TraceEvent:
      type: object
      required: [kind, ts_ms]
      properties:
        kind:
          type: string
          enum:
            - llm_request
            - llm_response
            - tool_call_start
            - tool_call
            - turn_stage
            - task_update
            - approval_required
            - agent_end
        ts_ms:
          type: integer
          format: int64
        phase:
          type: string
        tool:
          type: string
        tool_use_id:
          type: string
        label:
          type: string
          description: Short sanitized label (reason, description, or summary). Clamped server-side.
        risk_level:
          type: string
        status:
          type: string
        task_id:
          type: string
        success:
          type: boolean
        duration_ms:
          type: integer
          format: int64
        iteration:
          type: integer
          format: int32
        exit_code:
          type: integer
          format: int32
        usage_tokens:
          type: integer
          format: int64
    TraceSnapshot:
      type: object
      required: [run_id, first_event_ms, last_event_ms, truncated, events]
      properties:
        run_id:
          type: string
        first_event_ms:
          type: integer
          format: int64
        last_event_ms:
          type: integer
          format: int64
        truncated:
          type: boolean
        events:
          type: array
          items:
            $ref: '#/components/schemas/TraceEvent'
    SessionContextResponse:
      type: object
      description: |
        Live context-window pressure for an in-memory agent session.
        `pressure_percent` and `context_pressure_percent` are backend-calculated
        meter values. Clients must not recompute pressure from token ratios.
        Provider cache telemetry is exposed separately and does not reduce
        pressure, because cached prompt tokens still occupy provider-visible
        context.
      properties:
        status:
          type: string
          enum: [live]
        active:
          type: boolean
        live:
          type: boolean
        code:
          type: string
          nullable: true
          enum: [session_manager_unavailable, no_active_session]
          description: Present on unavailable envelopes; absent for live context.
        reason:
          type: string
          nullable: true
          description: User-safe reason for an unavailable context report.
        session_key:
          type: string
        sampled_at_ms:
          type: integer
          format: int64
        model:
          type: string
        model_provider:
          type: string
          nullable: true
        context_window_source:
          type: string
          enum: [override, model_capability, default, unknown]
        history_len:
          type: integer
          format: int64
        history_messages:
          type: integer
          format: int64
        message_count:
          type: integer
          format: int64
        pressure_token_source:
          type: string
          enum: [provider_last_usage, provider_preflight, local_estimate]
          description: Backend source used for the canonical pressure token count.
        local_token_estimate:
          type: integer
          format: int64
          description: Local chars-per-token fallback estimate; diagnostic only when pressure_token_source is provider-backed.
        provider_prompt_tokens:
          type: integer
          format: int64
          description: Last provider prompt_tokens sample used for pressure when pressure_token_source is provider_last_usage.
        provider_cached_prompt_tokens:
          type: integer
          format: int64
          description: Cached subset of provider_prompt_tokens; never subtracted from context pressure.
        tokens_used:
          type: integer
          format: int64
          description: Compatibility alias for live active context-window token estimate, not cumulative lifetime usage.
        token_count:
          type: integer
          format: int64
          description: Compatibility alias for live active context-window token estimate.
        token_estimate:
          type: integer
          format: int64
          description: Backend-selected provider-visible context tokens for the active window.
        context_window_used:
          type: integer
          format: int64
        context_window_max:
          type: integer
          format: int64
        max_history:
          type: integer
          format: int64
        token_limit:
          type: integer
          format: int64
          description: Compatibility alias for live context_window_tokens.
        context_window_tokens:
          type: integer
          format: int64
        remaining_tokens:
          type: integer
          format: int64
        usable_input_budget_tokens:
          type: integer
          format: int64
          description: Context window minus backend reply/tool/safety reserves.
        budget_pressure_percent:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Backend-calculated pressure against usable_input_budget_tokens.
        pressure_percent:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Canonical backend-calculated live context pressure.
        context_window_used_pct:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Compatibility alias for pressure_percent.
        context_pressure_percent:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Canonical backend-calculated live context pressure.
        token_total_reserve:
          type: integer
          format: int64
          description: Backend-owned reply/tool/safety reserve subtracted from usable input budget.
        context_bytes:
          type: object
          properties:
            content:
              type: integer
              format: int64
            reasoning:
              type: integer
              format: int64
              description: Retained assistant reasoning_content byte count; raw reasoning text is not exposed.
            total:
              type: integer
              format: int64
        estimator:
          type: object
          properties:
            name:
              type: string
              example: provider_bound_chars_v1
            version:
              type: integer
            method:
              type: string
              example: chars_per_token
            chars_per_token:
              type: integer
            includes:
              type: array
              items:
                type: string
        token_compaction_threshold:
          type: integer
          format: int64
        token_compaction_recommended_threshold:
          type: integer
          format: int64
        token_auto_compaction_pass_a_threshold:
          type: integer
          format: int64
        token_auto_compaction_pass_c_threshold:
          type: integer
          format: int64
        token_compaction_recommended:
          type: boolean
          description: Advisory marker set when pressure crosses the backend nudge threshold; automatic compaction still fires only at backend pass thresholds.
        token_compaction_triggered:
          type: boolean
          deprecated: true
          description: Legacy alias for token_compaction_recommended; does not mean an automatic compaction pass fired.
        compaction:
          type: object
          properties:
            nudge_percent:
              type: integer
              format: int32
            pass_a_percent:
              type: integer
              format: int32
            pass_c_percent:
              type: integer
              format: int32
            recommended:
              type: boolean
        provider_usage_last_turn:
          type: object
          description: Last provider-reported usage for calibration and cost diagnostics; cached tokens are not subtracted from context pressure.
          properties:
            available:
              type: boolean
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            reasoning_tokens:
              type: integer
            total_tokens:
              type: integer
            cached_prompt_tokens:
              type: integer
            cache_hit_percent:
              type: integer
        prompt_shape:
          type: object
          description: |
            Optional sanitized diagnostics for the last provider-bound request.
            Contains bucket sizes, counts, and hashes only; raw prompt text,
            user text, tool output, and reasoning text are never included.
            Diagnostics-only; clients must not use this as a pressure meter.
          properties:
            available:
              type: boolean
            method:
              type: string
              example: provider_request_shape_v1
            sampled_at_ms:
              type: integer
              format: int64
            provider:
              type: object
              properties:
                pressure_token_source:
                  type: string
                  enum: [provider_last_usage, provider_preflight, local_estimate]
                prompt_tokens:
                  type: integer
                  format: int64
                cached_prompt_tokens:
                  type: integer
                  format: int64
                  description: Cache telemetry only; never subtracted from pressure.
                cache_hit_percent:
                  type: integer
                preflight_prompt_tokens:
                  type: integer
                  format: int64
                preflight_active:
                  type: boolean
                model:
                  type: string
                context_window_tokens:
                  type: integer
                  format: int64
            tool_surface:
              type: object
              description: Sanitized diagnostics for the selected provider-bound tool surface. Diagnostics-only; never used for pressure math.
              properties:
                mode:
                  type: string
                  enum: [native_minimal, native_with_xml_fallback, xml_full, no_tools]
                provider_supports_native_tools:
                  type: boolean
                native_tool_count:
                  type: integer
                native_tool_schemas_present:
                  type: boolean
                xml_tool_catalog_present:
                  type: boolean
                prompt_tool_catalog_present:
                  type: boolean
                xml_fallback_protocol_present:
                  type: boolean
                native_tool_schema_bytes:
                  type: integer
                  format: int64
                xml_tool_catalog_bytes:
                  type: integer
                  format: int64
                prompt_tool_catalog_bytes:
                  type: integer
                  format: int64
                largest_tool_schemas:
                  type: array
                  description: Largest native tool schemas by sanitized name, byte counts, and hash only.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      description_bytes:
                        type: integer
                        format: int64
                      parameters_bytes:
                        type: integer
                        format: int64
                      bytes:
                        type: integer
                        format: int64
                      hash:
                        type: integer
                        format: int64
                      active:
                        type: boolean
            counts:
              type: object
              properties:
                messages:
                  type: integer
                system_messages:
                  type: integer
                user_messages:
                  type: integer
                assistant_messages:
                  type: integer
                tool_messages:
                  type: integer
                tool_schemas:
                  type: integer
                multimodal_parts:
                  type: integer
            cache:
              type: object
              properties:
                prompt_cache_key_present:
                  type: boolean
                prompt_cache_key_bytes:
                  type: integer
            buckets:
              type: object
              properties:
                stable_system_prompt_bytes:
                  type: integer
                  format: int64
                volatile_system_prompt_bytes:
                  type: integer
                  format: int64
                system_prompt_bytes:
                  type: integer
                  format: int64
                tool_schema_bytes:
                  type: integer
                  format: int64
                user_message_bytes:
                  type: integer
                  format: int64
                assistant_message_bytes:
                  type: integer
                  format: int64
                assistant_reasoning_bytes:
                  type: integer
                  format: int64
                  description: Size only; raw reasoning text is never exposed.
                tool_message_bytes:
                  type: integer
                  format: int64
                xml_tool_history_bytes:
                  type: integer
                  format: int64
                multimodal_payload_estimated_bytes:
                  type: integer
                  format: int64
                provider_bound_message_bytes:
                  type: integer
                  format: int64
                provider_request_body_bytes_estimated:
                  type: integer
                  format: int64
                  description: Estimated serialized provider request size; not tokenizer truth.
                history_tail_bytes:
                  type: integer
                  format: int64
            hashes:
              type: object
              properties:
                stable_system_prompt_hash:
                  type: integer
                  format: int64
                volatile_system_prompt_hash:
                  type: integer
                  format: int64
                history_tail_hash:
                  type: integer
                  format: int64
                full_request_hash:
                  type: integer
                  format: int64
            prompt_blocks:
              type: array
              description: Sanitized named prompt blocks; names, buckets, sizes, estimates, and hashes only.
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: xml_tool_catalog
                  bucket:
                    type: string
                    example: stable:xml_tools
                  bytes:
                    type: integer
                    format: int64
                  token_estimate:
                    type: integer
                    format: int64
                  hash:
                    type: integer
                    format: int64
                  active:
                    type: boolean
        cache:
          type: object
          description: Cache telemetry only; cache does not reduce live context pressure.
        last_turn_delta:
          type: object
          properties:
            bytes:
              type: integer
              format: int64
            token_estimate:
              type: integer
              format: int64
            pressure_points:
              type: integer
              format: int32
            tool_mode:
              type: string
              enum: [native_tool_calls, xml_fallback, mixed, no_tools]
        top_context_contributors:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              role:
                type: string
              source:
                type: string
              bytes:
                type: integer
              token_estimate:
                type: integer
        last_turn:
          type: object
          nullable: true
        report:
          type: object
          description: Full canonical context report; top-level fields are stable meter aliases for clients.
    SessionExportResponse:
      type: object
      properties:
        session_key:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
    SessionHistoryResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
    SessionMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      additionalProperties: true
    ChannelControlStatus:
      type: object
      description: |
        Per-channel activation status for the S7 control plane. Secret
        values are never present — only `secret_refs[].present`.
      required: [channel, label, build_enabled, operator_configured, user_managed, user_connected, status, secret_refs, config, last_test, endpoints]
      properties:
        channel:
          type: string
          example: slack
        label:
          type: string
          example: Slack
        build_enabled:
          type: boolean
          description: Adapter compiled into this build.
        operator_configured:
          type: boolean
          description: Channel configured at the deployment/operator level.
        user_managed:
          type: boolean
          description: false for telegram (dedicated routes own its mutation).
        user_connected:
          type: boolean
          description: True when status == connected.
        status:
          type: string
          enum: [disabled_in_build, connected, partial, operator_managed, not_connected]
        secret_refs:
          type: array
          description: Vault secret refs — presence only, never values.
          items:
            type: object
            required: [key, label, required, present]
            properties:
              key: { type: string, example: slack_bot_token }
              label: { type: string }
              required: { type: boolean }
              present: { type: boolean }
        config:
          type: object
          description: Non-secret display config (hosts, account ids, ports).
          additionalProperties: { type: string }
        last_test:
          nullable: true
          type: object
          required: [ok, checked_at_s, detail]
          properties:
            ok: { type: boolean }
            checked_at_s: { type: integer, format: int64 }
            detail:
              type: string
              description: credentials_present | missing_required_secret:<key> | malformed_secret:<key>
        endpoints:
          type: object
          required: [self, connect, test, disconnect]
          properties:
            self: { type: string }
            connect: { type: string }
            test: { type: string }
            disconnect: { type: string }
    ChannelControlFieldError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [missing_required_secret, invalid_secret, missing_required_config, invalid_config, secret_store_failed, secret_delete_failed]
        key:
          type: string
          description: The offending field key.
    ExtensionDevice:
      type: object
      description: One browser-extension device in the user registry (S7).
      required: [id, label, status, connection_state, paired_at_s, last_seen_at_s, last_command, last_command_at_s, last_error, last_error_at_s]
      properties:
        id: { type: string }
        label: { type: string }
        status:
          type: string
          enum: [active, revoked]
        connection_state:
          type: string
          enum: [connected, disconnected, never_connected, revoked]
          description: Derived from last_seen_at vs a 90s timeout (and revoke status).
        paired_at_s: { type: integer, format: int64 }
        last_seen_at_s: { type: integer, format: int64, nullable: true }
        last_command: { type: string, nullable: true, description: Last extension_* tool the device ran (populated by the WS runtime). }
        last_command_at_s: { type: integer, format: int64, nullable: true }
        last_error: { type: string, nullable: true }
        last_error_at_s: { type: integer, format: int64, nullable: true }
    ProviderProfile:
      type: object
      description: A user-managed model-provider profile (S7). The API key is never returned — only a secret_ref presence flag.
      required: [id, label, provider_kind, base_url, auth_style, model_allowlist, default_model, policy_state, secret_ref, last_test, created_at_s, updated_at_s]
      properties:
        id: { type: string }
        label: { type: string }
        provider_kind: { type: string }
        base_url: { type: string }
        auth_style: { type: string }
        model_allowlist:
          type: array
          items: { type: string }
        default_model: { type: string, nullable: true }
        policy_state:
          type: string
          enum: [active, disabled, blocked]
        secret_ref:
          type: object
          required: [key, present]
          properties:
            key: { type: string, example: provider_abc123_api_key }
            present: { type: boolean }
        last_test:
          nullable: true
          type: object
          properties:
            ok: { type: boolean }
            checked_at_s: { type: integer, format: int64 }
            detail: { type: string }
        created_at_s: { type: integer, format: int64 }
        updated_at_s: { type: integer, format: int64 }
    InternalDiagnosticsResponse:
      type: object
      description: |
        Runtime snapshot for operators. Shape is additive and may include more fields.
      properties:
        runtime_mode:
          type: string
        startup_self_check:
          type: string
        effective_config_source:
          type: string
          nullable: true
        effective_config_hash:
          type: string
          nullable: true
        memory_search_enabled:
          type: boolean
          nullable: true
        memory_summarizer_enabled:
          type: boolean
          nullable: true
        provider_retries:
          type: integer
          nullable: true
        fallback_provider_count:
          type: integer
          nullable: true
        memory_vector_sync_mode:
          type: string
          nullable: true
        memory_outbox_enabled:
          type: boolean
          nullable: true
        configured_config_source:
          type: string
          nullable: true
        configured_memory_search_enabled:
          type: boolean
          nullable: true
        configured_memory_summarizer_enabled:
          type: boolean
          nullable: true
        configured_provider_retries:
          type: integer
          nullable: true
        configured_fallback_provider_count:
          type: integer
          nullable: true
        configured_memory_vector_sync_mode_requested:
          type: string
          nullable: true
        configured_memory_outbox_requested:
          type: boolean
          nullable: true
        chat_stream_require_explicit_session_key:
          type: boolean
        chat_stream_lane_counts:
          type: object
          additionalProperties:
            type: integer
      additionalProperties: true
    ProductSettings:
      type: object
      properties:
        assistant_mode:
          type: string
          enum: [fast, balanced, deep]
        group_activation:
          type: string
          enum: [mention, always]
        proactive_updates:
          type: boolean
        voice_replies:
          type: boolean
        session_timeout_minutes:
          type: integer
          minimum: 5
          maximum: 180
      required:
        - assistant_mode
        - group_activation
        - proactive_updates
        - voice_replies
        - session_timeout_minutes
      additionalProperties: false
    OnboardingState:
      type: object
      required: [completed, completed_at_s, setup]
      properties:
        completed:
          type: boolean
        completed_at_s:
          type: integer
          nullable: true
        setup:
          type: object
          required: [can_start_chat_now, minimum_required, settings, channel_guides]
          properties:
            can_start_chat_now:
              type: boolean
            minimum_required:
              type: array
              items:
                type: string
            settings:
              type: object
              required: [endpoint, required_to_start, defaults, fields]
              properties:
                endpoint:
                  type: string
                required_to_start:
                  type: boolean
                defaults:
                  $ref: "#/components/schemas/ProductSettings"
                fields:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
            channel_guides:
              type: object
              properties:
                telegram:
                  $ref: "#/components/schemas/OnboardingChannelGuide"
                slack:
                  $ref: "#/components/schemas/OnboardingChannelGuide"
                discord:
                  $ref: "#/components/schemas/OnboardingChannelGuide"
              additionalProperties: false
          additionalProperties: false
      additionalProperties: false
    OnboardingChannelGuide:
      type: object
      required: [available, connect_supported, status, connected, required_inputs, instructions, connect_endpoint, disconnect_endpoint]
      properties:
        available:
          type: boolean
        connect_supported:
          type: boolean
        status:
          type: string
        connected:
          type: boolean
          nullable: true
        required_inputs:
          type: array
          items:
            type: string
        instructions:
          type: array
          items:
            type: string
        connect_endpoint:
          type: string
          nullable: true
        disconnect_endpoint:
          type: string
          nullable: true
      additionalProperties: false
    OwnershipLockConflictResponse:
      type: object
      required: [error, message, retry_after_ms, owner_instance_id, lease_until_s]
      properties:
        error:
          type: string
          enum: [ownership_lock_conflict]
        message:
          type: string
        retry_after_ms:
          type: integer
          minimum: 1
        owner_instance_id:
          type: string
          nullable: true
        lease_until_s:
          type: integer
          nullable: true
      additionalProperties: false

    # ── Attachments (Idempotency-Key dedupe — D7 SHIPPED 2026-05-28) ─
    AttachmentUploadResponse:
      type: object
      required: [path, bytes]
      properties:
        path:
          type: string
          description: Path relative to the user workspace; agent reads via the `file_read` tool.
        bytes:
          type: integer
          format: int64
          description: Decoded byte size of the written file.

    # ── Artifacts (Wave 2C) ─────────────────────────────────────────
    ArtifactSummary:
      type: object
      required: [id, title, kind, latest_version, updated_at_ms]
      properties:
        id:
          type: string
        title:
          type: string
        kind:
          type: string
          description: Free-form kind (markdown, code, html, etc.).
        latest_version:
          type: integer
          format: int32
        updated_at_ms:
          type: integer
          format: int64
        share_code:
          type: string
          nullable: true
    ArtifactListResponse:
      type: object
      required: [artifacts]
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactSummary'
    ArtifactResponse:
      type: object
      required: [id, title, kind, version, content, updated_at_ms]
      properties:
        id:
          type: string
        title:
          type: string
        kind:
          type: string
        version:
          type: integer
          format: int32
        content:
          type: string
        change_summary:
          type: string
          nullable: true
        updated_at_ms:
          type: integer
          format: int64
        share_code:
          type: string
          nullable: true
    ArtifactShareResponse:
      type: object
      required: [share_code, share_url, expires_at_ms]
      properties:
        share_code:
          type: string
        share_url:
          type: string
          description: Public URL rooted at /api/v1/share/artifact/{code}.
        expires_at_ms:
          type: integer
          format: int64

    # ── Artifact export bridge (Wave 2A — SHIPPED 2026-05-28) ───────
    ArtifactExportResponse:
      type: object
      required: [status, artifact_id, format, filename, path, url, download_url]
      properties:
        status:
          type: string
          enum: [exported]
        artifact_id:
          type: string
        format:
          type: string
          enum: [pdf, docx, pptx, xlsx, html]
        filename:
          type: string
          description: Generated filename inside attachments/produced/.
        path:
          type: string
          description: Path relative to the workspace, e.g. attachments/produced/report_<ts>_<rand>.pdf.
        url:
          type: string
          description: User-scoped binary URL (alias of download_url) — /api/v1/users/{user_id}/exports/{filename}.
        download_url:
          type: string
          description: Same as `url` — both fields exist for FE convenience.

    # ── Trace sharing ───────────────────────────────────────────────
    TraceShareResponse:
      type: object
      required: [share_code, share_url, expires_at_ms]
      properties:
        share_code:
          type: string
        share_url:
          type: string
          description: Public URL rooted at /api/v1/share/{code}.
        expires_at_ms:
          type: integer
          format: int64
