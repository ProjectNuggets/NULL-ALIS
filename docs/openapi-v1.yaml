openapi: 3.0.3
info:
  title: nullalis Gateway API
  version: "0.1"
  description: |
    Runtime HTTP API for nullalis v0.1.
    Contract baseline declaration date: 2026-03-18.

    Notes:
    - `/api/v1/*` and `/internal/*` endpoints use `X-Internal-Token` auth. In production-like mode this is always required; in local/non-production mode with no configured internal tokens, auth may be bypassed.
    - `X-Zaki-User-Id` is required for `/api/v1/chat/stream` when tenant mode is enabled.
    - `/api/v1/chat/stream` requires an explicit `session_key` by default.
    - `/webhook` auth is pairing-token based (Bearer), depending on pairing guard state.
    - Channel webhooks are unauthenticated at the internal-token layer; each route enforces its channel-specific verification/signature rules when configured.

    SOTA contract status (2026-04-17):
    - All existing endpoints below are STABLE and must not break.
    - SSE event vocabulary (`progress`, `reasoning_summary`, `tool_start`, `tool_result`,
      `approval_required`, `task_update`, `done`, etc.) is documented in
      docs/online-agent-contract.md. That document is the authoritative
      schema for frames emitted over `/api/v1/chat/stream`.
    - Direct operator controls are exposed as chat slash commands in the
      agent runtime (`/permissions`, `/mode`, `/plan`, `/review`,
      `/execute`, `/approve`, `/usage`, `/cost`). Session-scoped REST
      parity exists for approval, execution mode, AND backend-owned
      active-turn cancellation:
      `/api/v1/users/{user_id}/sessions/{session_key}/approve`,
      `/api/v1/users/{user_id}/sessions/{session_key}/mode`,
      `/api/v1/users/{user_id}/sessions/{session_key}/cancel`.
      Clients must NOT assume `/api/v1/chat/cancel`, `/api/v1/chat/resume`,
      or `/api/v1/chat/approve` exists — those endpoints have never been
      shipped. Cancel is idempotent; resume is not implemented and the
      reconnect contract relies on reconnecting to `POST /api/v1/chat/stream`
      plus reading the bounded in-process trace store via
      `GET /api/v1/users/{user_id}/traces/{run_id}` (see §7 of
      docs/online-agent-contract.md).
    - Canvas/artifact CRUD, share, export, attachment upload (with
      `Idempotency-Key` dedupe), trace sharing, and the authenticated
      export download route are documented below. The artifact export
      bridge resolves through `produce_document` and supports pdf, docx,
      pptx, xlsx, and html; unknown formats return 400.
    - TODO: Task lifecycle extensions are documented in docs/agent-lifecycle-spec.md.
servers:
  - url: http://127.0.0.1:3000
    description: Local gateway

tags:
  - name: ops
  - name: internal
  - name: app
  - name: user
  - name: webhook

paths:
  # ── Stable endpoints (do not break) ───────────────────────────────
  /health:
    get:
      tags: [ops]
      summary: Liveness check
      responses:
        "200":
          description: Gateway is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value: { status: "ok" }
                degraded:
                  value: { status: "degraded" }

  /ready:
    get:
      tags: [ops]
      summary: Readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "503":
          description: Not ready or draining
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /metrics:
    get:
      tags: [ops]
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string

  /pair:
    post:
      tags: [ops]
      summary: Pair gateway and mint bearer token
      parameters:
        - in: header
          name: X-Pairing-Code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pairing succeeded
          content:
            application/json:
              schema:
                type: object
                required: [status, token]
                properties:
                  status:
                    type: string
                    example: paired
                  token:
                    type: string
        "400":
          description: Missing pairing code
        "401":
          description: Invalid pairing code
        "409":
          description: Already paired
        "429":
          description: Pairing rate-limited or locked out

  /webhook:
    post:
      tags: [webhook]
      summary: Generic webhook chat ingress
      description: |
        Pairing-token protected generic webhook endpoint.
        Authorization is expected as `Authorization: Bearer <token>` when pairing guard enforces tokens.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                message:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: Accepted or replied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "429":
          description: Rate limited

  /webhook/telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress
      description: Canonical Telegram webhook route. `/telegram` is an alias with the same behavior.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /telegram:
    post:
      tags: [webhook]
      summary: Telegram webhook ingress (alias)
      description: Alias route for `/webhook/telegram`.
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
        - in: header
          name: X-Telegram-Bot-Api-Secret-Token
          required: false
          schema:
            type: string
          description: Required when secret token is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
        "403":
          description: Unauthorized Telegram config/token
        "409":
          description: Tenant ownership lock conflict
        "429":
          description: Rate limited

  /whatsapp:
    get:
      tags: [webhook]
      summary: WhatsApp webhook verification challenge
      parameters:
        - in: query
          name: hub.mode
          required: false
          schema:
            type: string
        - in: query
          name: hub.verify_token
          required: false
          schema:
            type: string
        - in: query
          name: hub.challenge
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Verification challenge echo
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Verification failed
    post:
      tags: [webhook]
      summary: WhatsApp webhook ingress
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: false
          schema:
            type: string
          description: Required when a WhatsApp app secret is configured.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature (when signature enforcement is active)
        "429":
          description: Rate limited

  /slack/events:
    post:
      tags: [webhook]
      summary: Slack Events API webhook ingress
      parameters:
        - in: header
          name: X-Slack-Request-Timestamp
          required: false
          schema:
            type: string
        - in: header
          name: X-Slack-Signature
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid signature for a configured Slack endpoint
        "404":
          description: Slack account or endpoint not configured
        "429":
          description: Rate limited

  /line:
    post:
      tags: [webhook]
      summary: LINE webhook ingress
      parameters:
        - in: header
          name: X-Line-Signature
          required: false
          schema:
            type: string
          description: Required when LINE channel secret verification is enabled.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Missing or invalid signature
        "429":
          description: Rate limited

  /lark:
    post:
      tags: [webhook]
      summary: Lark webhook ingress
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Processed (or challenge response)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Invalid verification token
        "429":
          description: Rate limited

  /internal/diagnostics:
    get:
      tags: [internal]
      summary: Runtime diagnostics snapshot
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalDiagnosticsResponse"
        "401":
          description: Unauthorized

  /internal/wake-heartbeat:
    post:
      tags: [internal]
      summary: Enqueue heartbeat wake
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  oneOf:
                    - type: string
                    - type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Enqueued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized

  /internal/drain:
    post:
      tags: [internal]
      summary: Enter drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/undrain:
    post:
      tags: [internal]
      summary: Exit drain mode
      security:
        - InternalToken: []
      responses:
        "200":
          description: Draining disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /internal/shutdown:
    post:
      tags: [internal]
      summary: Request graceful shutdown
      security:
        - InternalToken: []
      responses:
        "200":
          description: Shutdown requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/v1/chat/stream:
    post:
      tags: [app]
      summary: Chat with SSE streaming
      security:
        - InternalToken: []
      parameters:
        - in: header
          name: X-Zaki-User-Id
          required: false
          schema:
            type: string
          description: Required when tenant mode is enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, session_key]
              properties:
                message:
                  type: string
                text:
                  type: string
                user_id:
                  type: string
                session_key:
                  type: string
                  description: Required explicit lane key. In tenant mode it must belong to the authenticated user and use one of `main`, `thread:<id>`, `task:<id>`, or `cron:<id>`.
      responses:
        "200":
          description: |
            SSE stream of structured run events. Frames include (non-exhaustive):
            `status`, `ready` (tenant mode), `reply_start`, `progress`,
            `reasoning_summary`, `tool_start`, `tool_result`,
            `approval_required`, `task_update`, `token`, `error`, and a
            terminal `done`. See
            [docs/online-agent-contract.md](./online-agent-contract.md) for
            the full event schema, correlation ids (`run_id`,
            `tool_use_id`), and ordering invariants.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid payload, missing `session_key`, invalid lane, wrong-user lane, or missing user header in tenant mode
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized internal token
          content:
            text/event-stream:
              schema:
                type: string
        "409":
          description: Tenant ownership lock conflict (`event:error` includes `retry_after_ms`, optional `owner_instance_id`, optional `lease_until_s`)
          content:
            text/event-stream:
              schema:
                type: string
        "503":
          description: Gateway draining
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/users/provision:
    post:
      tags: [user]
      summary: Prepare tenant user state/workspace
      security:
        - InternalToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
      responses:
        "200":
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Missing/invalid user_id
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/onboarding:
    get:
      tags: [user]
      summary: Get onboarding state
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Onboarding state JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    put:
      tags: [user]
      summary: Update onboarding and workspace scaffolding fields
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap: { type: string }
                identity: { type: string }
                user: { type: string }
                soul: { type: string }
                heartbeat: { type: string }
                completed: { type: boolean }
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/config:
    get:
      tags: [user]
      summary: Get user config JSON
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Config content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [user]
      summary: Patch/replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled
    put:
      tags: [user]
      summary: Replace user config JSON (currently disabled)
      description: >
        Raw config writes are disabled in the current runtime. Use the
        settings endpoint instead. Always returns 403.
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Raw config writes disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: raw_config_writes_disabled

  /api/v1/users/{user_id}/settings:
    get:
      tags: [user]
      summary: Get user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
    patch:
      tags: [user]
      summary: Patch user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Update user-facing product settings
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assistant_mode:
                  type: string
                  enum: [fast, balanced, deep]
                group_activation:
                  type: string
                  enum: [mention, always]
                proactive_updates:
                  type: boolean
                voice_replies:
                  type: boolean
                session_timeout_minutes:
                  type: integer
                  minimum: 5
                  maximum: 180
              additionalProperties: false
      responses:
        "200":
          description: Updated product settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSettings"
        "400":
          description: Invalid settings payload
          content:
            application/json:
              examples:
                invalid_assistant_mode:
                  value: { error: invalid_assistant_mode }
                invalid_session_timeout_minutes:
                  value: { error: invalid_session_timeout_minutes }
                invalid_payload:
                  value: { error: invalid_payload }
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/heartbeat:
    get:
      tags: [user]
      summary: Get user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Heartbeat config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [user]
      summary: Set user heartbeat config
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/cron:
    get:
      tags: [user]
      summary: Get user cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Job list payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    patch:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    put:
      tags: [user]
      summary: Replace cron/jobs payload
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"
    delete:
      tags: [user]
      summary: Clear user cron/jobs
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Tenant ownership lock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipLockConflictResponse"

  /api/v1/users/{user_id}/secrets/{key}:
    get:
      tags: [user]
      summary: Read user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key: { type: string }
                  value: { type: string }
        "404":
          description: Secret not found
    put:
      tags: [user]
      summary: Upsert user secret
      security:
        - InternalToken: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
