; Mirrors the staging/prod pgBouncer config, which lives in the SEPARATE
; zaki-infra repo (ProjectNuggets/zaki-infra:
; charts/nullalis/templates/pgbouncer-deployment.yaml — transaction pooling +
; DISCARD ALL), so this reproduces the pooler the engine actually runs behind.
[databases]
zaki = host=pg port=5432 dbname=zaki user=zaki password=zaki

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 4
min_pool_size = 0
reserve_pool_size = 2
max_db_connections = 8
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits,options
